<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#dbeafe">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OTTO">

  <link rel="apple-touch-icon" href="icon-192.png">

  <title>OTTO • CENTRAL EXECUTIVA</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root {
      --texto: #0f172a;
      --texto-suave: #475569;
      --branco: #ffffff;

      --azul-700: #1d4ed8;
      --vermelho-700: #b91c1c;
      --dourado-700: #b45309;
      --verde-700: #047857;
      --roxo-700: #6d28d9;
      --preto-900: #020617;

      --sombra-forte: 0 40px 120px rgba(15, 23, 42, 0.28);
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--texto);
      background:
        radial-gradient(circle at 15% 15%, rgba(96, 165, 250, 0.55), transparent 28%),
        radial-gradient(circle at 85% 80%, rgba(34, 211, 238, 0.42), transparent 32%),
        linear-gradient(135deg, #f8fbff 0%, #eaf6ff 35%, #dbeafe 100%);
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .otto-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04));
    }

    #ottoCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.16;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.25) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
    }

    .glow-top {
      position: fixed;
      width: 54vw;
      height: 54vw;
      min-width: 440px;
      min-height: 440px;
      border-radius: 999px;
      top: -24vw;
      left: -18vw;
      z-index: 0;
      background: rgba(96, 165, 250, 0.42);
      filter: blur(70px);
      animation: orbTop 12s ease-in-out infinite;
      will-change: transform;
    }

    .glow-bottom {
      position: fixed;
      width: 52vw;
      height: 52vw;
      min-width: 420px;
      min-height: 420px;
      border-radius: 999px;
      right: -20vw;
      bottom: -22vw;
      z-index: 0;
      background: rgba(34, 211, 238, 0.35);
      filter: blur(76px);
      animation: orbBottom 14s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes orbTop {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(60px, 50px, 0) scale(1.08);
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes orbBottom {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(-50px, -40px, 0) scale(1.1);
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    .controls {
      position: fixed;
      top: max(22px, var(--safe-top));
      right: max(22px, var(--safe-right));
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .otto-btn {
      width: 62px;
      height: 62px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.46));
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      box-shadow:
        0 18px 36px rgba(37, 99, 235, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--azul-700);
      font-size: 25px;
      transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .otto-btn::before {
      content: "";
      position: absolute;
      inset: -80%;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.65) 45%, transparent 70%);
      transform: translateX(-55%) rotate(15deg);
      transition: 0.5s ease;
      pointer-events: none;
    }

    .otto-btn:hover {
      transform: translateY(-3px) scale(1.035);
      box-shadow:
        0 24px 52px rgba(37, 99, 235, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .otto-btn:hover::before {
      transform: translateX(65%) rotate(15deg);
    }

    .otto-btn.off {
      color: #94a3b8 !important;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.62), rgba(226, 232, 240, 0.42));
      box-shadow:
        0 12px 24px rgba(15, 23, 42, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .otto-btn.active-pulse::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 18px;
      border: 1px solid currentColor;
      opacity: 0.42;
      animation: btnPulse 1.2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes btnPulse {
      0% {
        transform: scale(0.94);
        opacity: 0.18;
      }

      50% {
        transform: scale(1.12);
        opacity: 0.5;
      }

      100% {
        transform: scale(0.94);
        opacity: 0.18;
      }
    }

    .status-pill {
      position: fixed;
      top: max(22px, var(--safe-top));
      left: max(22px, var(--safe-left));
      z-index: 26;
      max-width: min(420px, calc(100% - 180px));
      padding: 12px 16px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.86), rgba(255,255,255,.45));
      border: 1px solid rgba(255,255,255,.82);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 16px 38px rgba(15,23,42,.11);
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34,197,94,.14);
      flex: 0 0 auto;
    }

    .status-text {
      font-size: 12px;
      font-weight: 900;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entrada-invisivel {
      position: fixed;
      left: -9999px;
      top: -9999px;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .resultado-layer {
      position: fixed;
      inset: 0;
      z-index: 18;
      display: none;
      padding: 28px;
      pointer-events: none;
    }

    .resultado-layer.ativo {
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .resultado-box {
      width: min(1240px, 100%);
      max-height: min(76dvh, 790px);
      overflow: hidden;
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,255,255,0.72));
      border: 1px solid rgba(255,255,255,0.88);
      box-shadow:
        0 38px 110px rgba(15, 23, 42, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      animation: subirResultado .25s ease both;
    }

    @keyframes subirResultado {
      from {
        opacity: 0;
        transform: translateY(28px) scale(.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .resultado-header {
      padding: 20px 22px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(239,246,255,0.82), rgba(255,255,255,0.42));
    }

    .resultado-titulo-area {
      min-width: 0;
    }

    .resultado-kicker {
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #2563eb;
      margin-bottom: 4px;
    }

    .resultado-titulo {
      font-size: clamp(18px, 2.4vw, 30px);
      font-weight: 950;
      color: #0f172a;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }

    .resultado-subtitulo {
      margin-top: 5px;
      font-size: 13px;
      font-weight: 750;
      color: #64748b;
      overflow-wrap: anywhere;
    }

    .resultado-acoes {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .resultado-mini-btn {
      height: 46px;
      min-width: 46px;
      padding: 0 14px;
      border: none;
      border-radius: 17px;
      background: rgba(255,255,255,0.92);
      color: #0f172a;
      font-size: 13px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(15,23,42,.12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }

    .resultado-fechar {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 17px;
      background: rgba(255,255,255,0.92);
      color: #0f172a;
      font-size: 24px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(15,23,42,.14);
      flex: 0 0 auto;
    }

    .resultado-content {
      padding: 22px;
      overflow: auto;
      color: #0f172a;
      font-size: 15px;
      line-height: 1.55;
      scroll-behavior: smooth;
    }

    .resultado-content::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .resultado-content::-webkit-scrollbar-thumb {
      background: rgba(100,116,139,.35);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: padding-box;
    }

    .resultado-content h1,
    .resultado-content h2,
    .resultado-content h3 {
      line-height: 1.15;
      margin-bottom: 12px;
      color: #0f172a;
    }

    .resultado-content h1 {
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 950;
    }

    .resultado-content h2 {
      font-size: clamp(20px, 2.4vw, 30px);
      font-weight: 930;
    }

    .resultado-content h3 {
      font-size: clamp(17px, 2vw, 23px);
      font-weight: 880;
    }

    .resultado-content p {
      margin: 0 0 12px;
      color: #334155;
      font-weight: 620;
    }

    .resultado-content strong {
      color: #0f172a;
      font-weight: 950;
    }

    .resultado-content ul,
    .resultado-content ol {
      padding-left: 22px;
      margin: 10px 0 16px;
      color: #334155;
      font-weight: 650;
    }

    .resultado-content li {
      margin-bottom: 8px;
    }

    .resultado-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      margin: 14px 0;
    }

    .resultado-card {
      grid-column: span 3;
      border-radius: 24px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.95), rgba(248,250,252,0.86));
      border: 1px solid rgba(226,232,240,.9);
      box-shadow: 0 16px 38px rgba(15,23,42,.08);
      min-width: 0;
    }

    .resultado-card-label {
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      margin-bottom: 8px;
      overflow-wrap: anywhere;
    }

    .resultado-card-valor {
      font-size: clamp(20px, 2.4vw, 34px);
      font-weight: 950;
      color: #0f172a;
      line-height: 1.02;
      overflow-wrap: anywhere;
    }

    .resultado-card-desc {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 780;
      color: #64748b;
      overflow-wrap: anywhere;
    }

    .resultado-tabela-wrap {
      width: 100%;
      overflow: auto;
      border-radius: 22px;
      border: 1px solid rgba(226,232,240,.95);
      box-shadow: 0 16px 38px rgba(15,23,42,.07);
      margin: 16px 0;
      background: white;
    }

    .resultado-tabela {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: white;
    }

    .resultado-tabela th {
      text-align: left;
      padding: 14px 16px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 950;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .resultado-tabela td {
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      color: #0f172a;
      font-size: 14px;
      font-weight: 720;
      white-space: nowrap;
    }

    .resultado-tabela tr:nth-child(even) td {
      background: #f8fafc;
    }

    .resultado-tabela .positivo {
      color: #047857;
      font-weight: 950;
    }

    .resultado-tabela .negativo {
      color: #b91c1c;
      font-weight: 950;
    }

    .resultado-tabela .alerta {
      color: #b45309;
      font-weight: 950;
    }

    .resultado-grafico-box {
      margin: 18px 0;
      padding: 18px;
      border-radius: 26px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(226,232,240,.95);
      box-shadow: 0 16px 42px rgba(15,23,42,.08);
    }

    .resultado-grafico-titulo {
      font-size: 16px;
      font-weight: 950;
      color: #0f172a;
      margin-bottom: 12px;
    }

    .resultado-grafico-canvas {
      width: 100% !important;
      height: 330px !important;
    }

    .resultado-html {
      display: block;
    }

    .resultado-html .bloco {
      padding: 16px;
      border-radius: 22px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      margin-bottom: 12px;
    }

    .resultado-html .positivo,
    .positivo {
      color: #047857;
      font-weight: 950;
    }

    .resultado-html .negativo,
    .negativo {
      color: #b91c1c;
      font-weight: 950;
    }

    .resultado-html .alerta,
    .alerta {
      color: #b45309;
      font-weight: 950;
    }

    .resultado-box[data-tema="escuro"],
    .resultado-box[data-tema="preto"],
    .resultado-box[data-tema="executivo"] {
      background:
        linear-gradient(135deg, rgba(15,23,42,0.96), rgba(30,41,59,0.88));
      border-color: rgba(148,163,184,.26);
    }

    .resultado-box[data-tema="escuro"] .resultado-header,
    .resultado-box[data-tema="preto"] .resultado-header,
    .resultado-box[data-tema="executivo"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(15,23,42,0.94), rgba(30,41,59,0.62));
      border-bottom-color: rgba(148,163,184,.22);
    }

    .resultado-box[data-tema="escuro"] .resultado-titulo,
    .resultado-box[data-tema="escuro"] .resultado-content,
    .resultado-box[data-tema="escuro"] .resultado-card-valor,
    .resultado-box[data-tema="escuro"] .resultado-content h1,
    .resultado-box[data-tema="escuro"] .resultado-content h2,
    .resultado-box[data-tema="escuro"] .resultado-content h3,
    .resultado-box[data-tema="preto"] .resultado-titulo,
    .resultado-box[data-tema="preto"] .resultado-content,
    .resultado-box[data-tema="preto"] .resultado-card-valor,
    .resultado-box[data-tema="preto"] .resultado-content h1,
    .resultado-box[data-tema="preto"] .resultado-content h2,
    .resultado-box[data-tema="preto"] .resultado-content h3,
    .resultado-box[data-tema="executivo"] .resultado-titulo,
    .resultado-box[data-tema="executivo"] .resultado-content,
    .resultado-box[data-tema="executivo"] .resultado-card-valor,
    .resultado-box[data-tema="executivo"] .resultado-content h1,
    .resultado-box[data-tema="executivo"] .resultado-content h2,
    .resultado-box[data-tema="executivo"] .resultado-content h3 {
      color: #f8fafc;
    }

    .resultado-box[data-tema="escuro"] .resultado-subtitulo,
    .resultado-box[data-tema="escuro"] .resultado-content p,
    .resultado-box[data-tema="escuro"] .resultado-card-label,
    .resultado-box[data-tema="escuro"] .resultado-card-desc,
    .resultado-box[data-tema="preto"] .resultado-subtitulo,
    .resultado-box[data-tema="preto"] .resultado-content p,
    .resultado-box[data-tema="preto"] .resultado-card-label,
    .resultado-box[data-tema="preto"] .resultado-card-desc,
    .resultado-box[data-tema="executivo"] .resultado-subtitulo,
    .resultado-box[data-tema="executivo"] .resultado-content p,
    .resultado-box[data-tema="executivo"] .resultado-card-label,
    .resultado-box[data-tema="executivo"] .resultado-card-desc {
      color: #cbd5e1;
    }

    .resultado-box[data-tema="escuro"] .resultado-card,
    .resultado-box[data-tema="escuro"] .resultado-grafico-box,
    .resultado-box[data-tema="escuro"] .resultado-html .bloco,
    .resultado-box[data-tema="preto"] .resultado-card,
    .resultado-box[data-tema="preto"] .resultado-grafico-box,
    .resultado-box[data-tema="preto"] .resultado-html .bloco,
    .resultado-box[data-tema="executivo"] .resultado-card,
    .resultado-box[data-tema="executivo"] .resultado-grafico-box,
    .resultado-box[data-tema="executivo"] .resultado-html .bloco {
      background: rgba(30,41,59,.86);
      border-color: rgba(148,163,184,.22);
    }

    .resultado-box[data-tema="dourado"] .resultado-kicker {
      color: #b45309;
    }

    .resultado-box[data-tema="dourado"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(255,251,235,.95), rgba(254,243,199,.62));
    }

    .resultado-box[data-tema="dourado"] .resultado-tabela th {
      background: #fffbeb;
      color: #92400e;
    }

    .resultado-box[data-tema="vermelho"] .resultado-kicker {
      color: #b91c1c;
    }

    .resultado-box[data-tema="vermelho"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(255,241,242,.95), rgba(254,205,211,.58));
    }

    .resultado-box[data-tema="vermelho"] .resultado-tabela th {
      background: #fff1f2;
      color: #991b1b;
    }

    .resultado-box[data-tema="verde"] .resultado-kicker {
      color: #047857;
    }

    .resultado-box[data-tema="verde"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(236,253,245,.95), rgba(209,250,229,.58));
    }

    .resultado-box[data-tema="verde"] .resultado-tabela th {
      background: #ecfdf5;
      color: #065f46;
    }

    .resultado-box[data-tema="roxo"] .resultado-kicker {
      color: #6d28d9;
    }

    .resultado-box[data-tema="roxo"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(245,243,255,.95), rgba(221,214,254,.58));
    }

    .resultado-box[data-tema="roxo"] .resultado-tabela th {
      background: #f5f3ff;
      color: #5b21b6;
    }

    .canvas-layer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      background: rgba(239, 246, 255, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      padding: 28px;
    }

    .canvas-layer.ativo {
      display: block;
    }

    .canvas-frame-box {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 34px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.82);

      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function desenharFundo() {
      const tema = getTema();

      const grad = ctx.createLinearGradient(0, 0, largura, altura);

      grad.addColorStop(0, tema.fundo1);
      grad.addColorStop(0.32, tema.fundo2);
      grad.addColorStop(0.68, tema.fundo3);
      grad.addColorStop(1, tema.fundo4);

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, largura, altura);

      const g1 = ctx.createRadialGradient(
        largura * 0.18,
        altura * 0.18,
        0,
        largura * 0.18,
        altura * 0.18,
        largura * 0.55
      );

      g1.addColorStop(0, "rgba(" + tema.destaque + ",0.46)");
      g1.addColorStop(0.42, "rgba(" + tema.destaque + ",0.16)");
      g1.addColorStop(1, "rgba(" + tema.destaque + ",0)");

      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, largura, altura);

      const g2 = ctx.createRadialGradient(
        largura * 0.86,
        altura * 0.84,
        0,
        largura * 0.86,
        altura * 0.84,
        largura * 0.48
      );

      g2.addColorStop(0, "rgba(" + tema.secundario + ",0.40)");
      g2.addColorStop(0.5, "rgba(" + tema.secundario + ",0.14)");
      g2.addColorStop(1, "rgba(" + tema.secundario + ",0)");

      ctx.fillStyle = g2;
      ctx.fillRect(0, 0, largura, altura);
    }

    function desenharGrade() {
      const tema = getTema();
      const espacamento = largura < 768 ? 44 : 58;

      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = "rgba(" + tema.grid + ",0.20)";
      ctx.lineWidth = 1;

      for (let x = -espacamento; x <= largura + espacamento; x += espacamento) {
        ctx.beginPath();
        ctx.moveTo(x + Math.sin(tempo * 0.008) * 6, 0);
        ctx.lineTo(x - Math.sin(tempo * 0.008) * 6, altura);
        ctx.stroke();
      }

      for (let y = -espacamento; y <= altura + espacamento; y += espacamento) {
        ctx.beginPath();
        ctx.moveTo(0, y + Math.cos(tempo * 0.008) * 6);
        ctx.lineTo(largura, y - Math.cos(tempo * 0.008) * 6);
        ctx.stroke();
      }

      ctx.restore();
    }

    function desenharParticulas() {
      const tema = getTema();

      ctx.save();

      particulas.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.fase += 0.018;

        if (p.x < -20) p.x = largura + 20;
        if (p.x > largura + 20) p.x = -20;
        if (p.y < -20) p.y = altura + 20;
        if (p.y > altura + 20) p.y = -20;

        const alpha = p.a + Math.sin(p.fase) * 0.08;

        ctx.beginPath();
        ctx.fillStyle = "rgba(" + tema.particula + "," + Math.max(0.04, alpha) + ")";
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    function desenharLinhas() {
      const tema = getTema();

      ctx.save();

      linhas.forEach((l) => {
        l.y1 += l.v * 0.08;
        l.y2 += l.v * 0.08;

        if (l.y1 > altura + 80) l.y1 = -80;
        if (l.y2 > altura + 80) l.y2 = -80;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.primario + "," + l.a + ")";
        ctx.lineWidth = 1;
        ctx.moveTo(l.x1, l.y1);
        ctx.lineTo(l.x2, l.y2);
        ctx.stroke();
      });

      ctx.restore();
    }

    function desenharFagulhas() {
      const tema = getTema();

      if (!tema.modoFagulha) return;

      ctx.save();

      fagulhas.forEach((f) => {
        f.y -= f.velocidade;
        f.x += Math.sin(tempo * 0.025 + f.fase) * 0.45;
        f.fase += 0.015;

        if (f.y < -20) {
          f.y = altura + 20;
          f.x = Math.random() * largura;
        }

        const alpha = f.alpha + Math.sin(f.fase) * 0.08;

        ctx.beginPath();
        ctx.fillStyle = "rgba(" + tema.destaque + "," + Math.max(0.04, alpha) + ")";
        ctx.arc(f.x, f.y, f.tamanho, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    function desenharCifroes() {
      const tema = getTema();

      if (!tema.modoCifrao) return;

      ctx.save();

      cifras.forEach((c) => {
        c.y += c.velocidade;
        c.giro += c.giroVel;

        if (c.y > altura + 80) {
          c.y = -90;
          c.x = Math.random() * largura;
          c.tamanho = 18 + Math.random() * 42;
          c.velocidade = 0.9 + Math.random() * 2.4;
          c.alpha = 0.12 + Math.random() * 0.36;
          c.texto = Math.random() > 0.32 ? "$" : "R$";
        }

        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.giro);

        ctx.font = "900 " + c.tamanho + "px Inter, Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(217,119,6," + c.alpha + ")";
        ctx.shadowColor = "rgba(251,191,36,0.35)";
        ctx.shadowBlur = 16;
        ctx.fillText(c.texto, 0, 0);

        ctx.restore();
      });

      ctx.restore();
    }

    function desenharRaios() {
      const tema = getTema();

      if (!tema.modoRaio) return;

      ctx.save();

      raios.forEach((r) => {
        r.y += r.velocidade;
        r.x += r.inclinacao;

        if (r.y > altura + r.comprimento) {
          r.y = -r.comprimento;
          r.x = Math.random() * largura;
        }

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.destaque + "," + r.alpha + ")";
        ctx.lineWidth = 1;
        ctx.moveTo(r.x, r.y);
        ctx.lineTo(r.x + r.inclinacao * 40, r.y + r.comprimento);
        ctx.stroke();
      });

      ctx.restore();
    }

    function desenharChuva() {
      const tema = getTema();

      if (!tema.modoChuva) return;

      ctx.save();

      chuva.forEach((p) => {
        p.y += p.velocidade;

        if (p.y > altura + 30) {
          p.y = -30;
          p.x = Math.random() * largura;
        }

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.secundario + "," + p.alpha + ")";
        ctx.lineWidth = 1;
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x, p.y + p.tamanho);
        ctx.stroke();
      });

      ctx.restore();
    }

    function desenharNucleo() {
      const tema = getTema();

      const menor = Math.min(largura, altura);
      const base = Math.max(120, Math.min(250, menor * 0.22));
      const respiracao = Math.sin(tempo * 0.035) * 8;
      const raio = base + respiracao + intensidadeVoz * 16 + pulsoResposta * 18;

      ctx.save();

      for (let i = 0; i < estrelas.length; i++) {
        const e = estrelas[i];

        e.angulo += e.velocidade * (1 + nivelEnergia * 2.2);

        const dist = e.raio + Math.sin(tempo * 0.01 + i) * 10;
        const x = centroX + Math.cos(e.angulo) * dist;
        const y = centroY + Math.sin(e.angulo) * dist * 0.62;

        ctx.beginPath();
        ctx.fillStyle = "rgba(" + tema.primario + "," + e.alpha + ")";
        ctx.arc(x, y, e.tamanho, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < 5; i++) {
        const r = raio + i * 34 + Math.sin(tempo * 0.025 + i) * 8;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.primario + "," + (0.18 - i * 0.026) + ")";
        ctx.lineWidth = 1.6;
        ctx.arc(centroX, centroY, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      for (let i = 0; i < 4; i++) {
        const rX = raio * (1.18 + i * 0.16);
        const rY = raio * (0.42 + i * 0.08);
        const rotacao = tempo * 0.005 * (i % 2 === 0 ? 1 : -1);

        ctx.save();
        ctx.translate(centroX, centroY);
        ctx.rotate(rotacao + i * 0.72);

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.secundario + "," + (0.22 - i * 0.035) + ")";
        ctx.lineWidth = 1.8;
        ctx.ellipse(0, 0, rX, rY, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }

      const nucleoGrad = ctx.createRadialGradient(
        centroX,
        centroY,
        0,
        centroX,
        centroY,
        raio
      );

      nucleoGrad.addColorStop(0, "rgba(255,255,255,0.96)");
      nucleoGrad.addColorStop(0.32, "rgba(" + tema.destaque + ",0.38)");
      nucleoGrad.addColorStop(0.72, "rgba(" + tema.primario + ",0.26)");
      nucleoGrad.addColorStop(1, "rgba(" + tema.primario + ",0.06)");

      ctx.beginPath();
      ctx.fillStyle = nucleoGrad;
      ctx.arc(centroX, centroY, raio, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.strokeStyle = temaAtual === "preto" || temaAtual === "neon"
        ? "rgba(255,255,255,0.34)"
        : "rgba(255,255,255,0.88)";
      ctx.lineWidth = 2;
      ctx.arc(centroX, centroY, raio * 0.98, 0, Math.PI * 2);
      ctx.stroke();

      const brilho = ctx.createRadialGradient(
        centroX - raio * 0.28,
        centroY - raio * 0.32,
        0,
        centroX - raio * 0.28,
        centroY - raio * 0.32,
        raio * 0.86
      );

      brilho.addColorStop(0, "rgba(255,255,255,0.9)");
      brilho.addColorStop(0.34, "rgba(255,255,255,0.24)");
      brilho.addColorStop(1, "rgba(255,255,255,0)");

      ctx.beginPath();
      ctx.fillStyle = brilho;
      ctx.arc(centroX, centroY, raio, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function quebrarTexto(texto, maxCaracteres) {
      const palavras = String(texto || "").split(" ");
      const linhasTexto = [];
      let atual = "";

      palavras.forEach((palavra) => {
        const tentativa = atual ? atual + " " + palavra : palavra;

        if (tentativa.length > maxCaracteres) {
          if (atual) {
            linhasTexto.push(atual);
          }

          atual = palavra;
        } else {
          atual = tentativa;
        }
      });

      if (atual) {
        linhasTexto.push(atual);
      }

      return linhasTexto;
    }

    function desenharTextos() {
      const tema = getTema();

      const menor = Math.min(largura, altura);
      const tamanhoTitulo = Math.max(54, Math.min(122, menor * 0.135));
      const yTitulo = centroY - tamanhoTitulo * 0.12;

      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      ctx.shadowColor = tema.sombra;
      ctx.shadowBlur = 30;

      ctx.font = "900 " + tamanhoTitulo + "px Inter, Arial";
      ctx.fillStyle = tema.corTexto;
      ctx.fillText(tema.titulo, centroX, yTitulo);

      ctx.shadowBlur = 0;

      ctx.font = "800 " + Math.max(12, Math.min(18, menor * 0.018)) + "px Inter, Arial";
      ctx.fillStyle = "rgba(" + tema.primario + ",0.86)";
      ctx.fillText(tema.subtitulo, centroX, yTitulo + tamanhoTitulo * 0.55);

      ctx.font = "800 " + Math.max(11, Math.min(15, menor * 0.016)) + "px Inter, Arial";
      ctx.fillStyle = tema.corSuave;
      ctx.fillText(estadoOtto, centroX, yTitulo + tamanhoTitulo * 0.86);

      ctx.font = "600 " + Math.max(10, Math.min(14, menor * 0.015)) + "px Inter, Arial";
      ctx.fillStyle = tema.corSuave;
      ctx.fillText(subEstadoOtto, centroX, yTitulo + tamanhoTitulo * 1.12);

      const larguraTexto = Math.min(largura * 0.82, 940);
      const maxChars = largura < 768 ? 36 : 86;

      let textoInferior = "";

      if (processando) {
        textoInferior = "Estou analisando sua solicitação.";
      } else if (ultimaRespostaOtto) {
        textoInferior = ultimaRespostaOtto;
      } else if (ultimoTextoUsuario) {
        textoInferior = "Recebido: " + ultimoTextoUsuario;
      } else {
        textoInferior = "Fale naturalmente. O OTTO escuta, interpreta e envia tudo para a central inteligente.";
      }

      const linhasTexto = quebrarTexto(textoInferior, maxChars).slice(0, 4);
      const alturaCaixa = 34 + linhasTexto.length * 24;
      const xCaixa = centroX - larguraTexto / 2;
      const yCaixa = altura - alturaCaixa - Math.max(52, altura * 0.07);

      ctx.save();
      ctx.globalAlpha = 0.96;
      arredondarRetangulo(xCaixa, yCaixa, larguraTexto, alturaCaixa, 26);

      const gradCaixa = ctx.createLinearGradient(
        xCaixa,
        yCaixa,
        xCaixa + larguraTexto,
        yCaixa + alturaCaixa
      );

      gradCaixa.addColorStop(0, tema.caixa);
      gradCaixa.addColorStop(1, tema.caixa2);

      ctx.fillStyle = gradCaixa;
      ctx.fill();

      ctx.strokeStyle = temaAtual === "preto" || temaAtual === "neon"
        ? "rgba(255,255,255,0.22)"
        : "rgba(255,255,255,0.72)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.font = "700 " + Math.max(13, Math.min(16, menor * 0.016)) + "px Inter, Arial";
      ctx.fillStyle = tema.corTexto;
      ctx.textBaseline = "top";

      linhasTexto.forEach((linha, index) => {
        ctx.fillText(
          linha,
          centroX,
          yCaixa + 18 + index * 24
        );
      });

      ctx.restore();
      ctx.restore();
    }

    function desenharOndas() {
      const tema = getTema();

      ctx.save();

      ondas = ondas.filter((o) => o.alpha > 0.01);

      ondas.forEach((o) => {
        o.r += o.vel;
        o.alpha *= 0.965;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.primario + "," + o.alpha + ")";
        ctx.lineWidth = o.largura;
        ctx.arc(centroX, centroY, o.r, 0, Math.PI * 2);
        ctx.stroke();
      });

      ctx.restore();
    }

    function criarOnda(forca) {
      ondas.push({
        r: Math.max(80, Math.min(largura, altura) * 0.15),
        vel: 2.8 + forca * 5,
        alpha: 0.28 + forca * 0.18,
        largura: 1.4 + forca * 2
      });
    }

    function animar() {
      frameAtual = requestAnimationFrame(animar);

      tempo += 1;

      intensidadeVoz *= 0.92;
      pulsoResposta *= 0.94;

      nivelEnergia += ((processando ? 0.92 : micAtivo ? 0.68 : 0.38) - nivelEnergia) * 0.035;

      if (tempo % 58 === 0) {
        criarOnda(processando ? 0.9 : 0.35);
      }

      desenharFundo();
      desenharGrade();
      desenharLinhas();
      desenharRaios();
      desenharChuva();
      desenharParticulas();
      desenharFagulhas();
      desenharCifroes();
      desenharOndas();
      desenharNucleo();
      desenharTextos();
    }

    function obterSaudacao() {
      const hora = new Date().getHours();

      if (hora < 12) {
        return "Bom dia";
      }

      if (hora < 18) {
        return "Boa tarde";
      }

      return "Boa noite";
    }

    function atualizarEstado(texto, subtitulo) {
      estadoOtto = texto || estadoOtto;
      subEstadoOtto = subtitulo || subEstadoOtto;
      atualizarStatusVisual();
    }

    function normalizarTexto(texto) {
      return String(texto || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function detectarComandoVisual(texto) {
      const t = normalizarTexto(texto);

      if (
        t.includes("otto estou estressado") ||
        t.includes("estou estressado") ||
        t.includes("to estressado") ||
        t.includes("estou nervoso") ||
        t.includes("to nervoso") ||
        t.includes("modo vermelho") ||
        t.includes("modo controle")
      ) {
        return "vermelho";
      }

      if (
        t.includes("vamos pra cima") ||
        t.includes("vamo pra cima") ||
        t.includes("vamos para cima") ||
        t.includes("modo dourado") ||
        t.includes("modo resultado") ||
        t.includes("bora vender") ||
        t.includes("bora faturar")
      ) {
        return "dourado";
      }

      if (
        t.includes("modo operacao") ||
        t.includes("modo operacional") ||
        t.includes("modo verde") ||
        t.includes("controle operacional")
      ) {
        return "verde";
      }

      if (
        t.includes("modo estrategia") ||
        t.includes("modo estrategico") ||
        t.includes("modo roxo") ||
        t.includes("analise estrategica")
      ) {
        return "roxo";
      }

      if (
        t.includes("modo executivo") ||
        t.includes("modo preto") ||
        t.includes("modo diretoria") ||
        t.includes("modo premium")
      ) {
        return "preto";
      }

      if (
        t.includes("modo neon") ||
        t.includes("modo digital") ||
        t.includes("modo tecnologia")
      ) {
        return "neon";
      }

      if (
        t.includes("modo padrao") ||
        t.includes("voltar ao normal") ||
        t.includes("volta ao normal") ||
        t.includes("tema azul") ||
        t.includes("modo azul")
      ) {
        return "azul";
      }

      return null;
    }

function gerarNomePrintOtto() {
  const agora = new Date();

  const ano = agora.getFullYear();
  const mes = String(agora.getMonth() + 1).padStart(2, "0");
  const dia = String(agora.getDate()).padStart(2, "0");
  const hora = String(agora.getHours()).padStart(2, "0");
  const minuto = String(agora.getMinutes()).padStart(2, "0");
  const segundo = String(agora.getSeconds()).padStart(2, "0");

  return "OTTO_PRINT_" + ano + "-" + mes + "-" + dia + "_" + hora + "-" + minuto + "-" + segundo + ".png";
}

async function tirarPrintScreenPorVoz() {
  try {
    atualizarEstado("PRINT SCREEN", "Capturando a janela atual do OTTO");
    mostrarToast("Tirando print da janela atual...");

    if (typeof html2canvas === "undefined") {
      mostrarToast("Erro: html2canvas não carregou. Coloque o script no HEAD.");
      atualizarEstado("ERRO NO PRINT", "Biblioteca html2canvas não carregada");
      garantirMicrofoneAtivo();
      return;
    }

    const alvo = document.querySelector(".otto-shell") || document.body;

    await new Promise(function (resolve) {
      requestAnimationFrame(function () {
        setTimeout(resolve, 120);
      });
    });

    const canvasPrint = await html2canvas(alvo, {
      backgroundColor: null,
      scale: Math.min(2, window.devicePixelRatio || 1),
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: window.innerWidth,
      height: window.innerHeight,
      windowWidth: window.innerWidth,
      windowHeight: window.innerHeight,
      scrollX: 0,
      scrollY: 0,
      ignoreElements: function (elemento) {
        return elemento && elemento.id === "toastOtto";
      }
    });

    const nomeArquivo = gerarNomePrintOtto();

    canvasPrint.toBlob(async function (blob) {
      if (!blob) {
        mostrarToast("Não foi possível gerar o arquivo do print.");
        atualizarEstado("ERRO NO PRINT", "Falha ao gerar imagem");
        garantirMicrofoneAtivo();
        return;
      }

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = nomeArquivo;
      link.style.display = "none";

      document.body.appendChild(link);
      link.click();
      link.remove();

      setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 1500);

      ultimaRespostaOtto = "Print salvo: " + nomeArquivo;
      ultimaRespostaCompleta = "Print salvo: " + nomeArquivo;
      pulsoResposta = 1;

      mostrarToast("Print salvo na pasta de downloads: " + nomeArquivo);

      atualizarEstado(
        micAtivo ? "ESCUTANDO" : "PRINT SALVO",
        micAtivo ? "Print salvo. Microfone ativo continuamente" : "Print salvo com sucesso"
      );

      await falar("Print salvo.");

      garantirMicrofoneAtivo();
    }, "image/png", 1);

  } catch (erro) {
    console.error("Erro ao tirar print da janela:", erro);

    mostrarToast("Não consegui salvar o print da janela atual.");
    atualizarEstado("ERRO NO PRINT", "Falha ao capturar a janela atual");

    await falar("Não consegui salvar o print.");

    garantirMicrofoneAtivo();
  }
}



    
    async function ativarTema(novoTema, falarMudanca = true) {

      temaAtual = novoTema;
      localStorage.setItem("ottoTemaAtual", novoTema);

      const tema = getTema();

    function limparTextoParaFala(texto) {
      return String(texto || "")
        .replace(/<[^>]*>/g, " ")
        .replace(/\*/g, "")
        .replace(/#/g, "")
        .replace(/_/g, "")
        .replace(/\|/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    async function carregarVozes() {
      await new Promise((resolve) => {
        const vozesAtuais = speechSynthesis.getVoices();

        if (vozesAtuais && vozesAtuais.length) {
          resolve();
          return;
        }

        speechSynthesis.onvoiceschanged = function () {
          resolve();
        };

        setTimeout(resolve, 800);
      });

      return speechSynthesis.getVoices();
    }

    async function falar(texto) {
      if (!vozAtiva) return;
      if (!texto) return;
      if (!("speechSynthesis" in window)) return;

      try {
        const textoFinal = limparTextoParaFala(texto);

        if (!textoFinal) return;

        speechSynthesis.cancel();

        const vozes = await carregarVozes();

        const fala = new SpeechSynthesisUtterance(textoFinal);

        fala.lang = "pt-BR";
        fala.rate = 1.62;
        fala.pitch = 0.84;
        fala.volume = 1;

        let vozEscolhida =
          vozes.find((voz) =>
            voz.lang === "pt-BR" &&
            voz.name.toLowerCase().includes("male")
          ) ||
          vozes.find((voz) =>
            voz.lang === "pt-BR" &&
            voz.name.toLowerCase().includes("mascul")
          ) ||
          vozes.find((voz) =>
            voz.lang === "pt-BR" &&
            voz.name.toLowerCase().includes("antonio")
          ) ||
          vozes.find((voz) =>
            voz.lang === "pt-BR" &&
            voz.name.toLowerCase().includes("daniel")
          ) ||
          vozes.find((voz) =>
            voz.lang === "pt-BR" &&
            voz.name.toLowerCase().includes("felipe")
          ) ||
          vozes.find((voz) =>
            voz.lang === "pt-BR" &&
            voz.name.toLowerCase().includes("google")
          ) ||
          vozes.find((voz) =>
            voz.lang === "pt-BR"
          ) ||
          vozes.find((voz) =>
            voz.lang.toLowerCase().includes("pt")
          ) ||
          null;

        if (vozEscolhida) {
          fala.voice = vozEscolhida;
        }

        fala.onstart = function () {
          falandoAgora = true;
          ignorarResultadoAte = Date.now() + 1200;
          intensidadeVoz = 0.9;
          atualizarEstado("FALANDO", "Linguagem contínua");
        };

        fala.onboundary = function () {
          intensidadeVoz = Math.min(1, intensidadeVoz + 0.15);
        };

        fala.onend = function () {
          falandoAgora = false;
          ignorarResultadoAte = Date.now() + 900;
          intensidadeVoz = 0.2;

          if (!processando) {
            atualizarEstado(
              micAtivo ? "ESCUTANDO" : "MICROFONE DESLIGADO",
              micAtivo ? "Microfone ativo continuamente" : "Ative o microfone"
            );
          }

          garantirMicrofoneAtivo();
        };

        fala.onerror = function () {
          falandoAgora = false;
          ignorarResultadoAte = Date.now() + 900;

          atualizarEstado("VOZ INDISPONÍVEL", "O navegador bloqueou ou interrompeu a fala");

          garantirMicrofoneAtivo();
        };

        speechSynthesis.speak(fala);
      } catch (erro) {
        falandoAgora = false;
        console.error("Erro ao falar:", erro);
        garantirMicrofoneAtivo();
      }
    }

    async function liberarAudioEEntrada() {

    function prepararReconhecimento() {
      if (!SpeechRecognition) {
        atualizarEstado(
          "MICROFONE INDISPONÍVEL",
          "Este navegador não suporta reconhecimento de voz"
        );

        btnMic.classList.add("off");
        btnMic.classList.remove("active-pulse");

        return;
      }

      recognition = new SpeechRecognition();

      recognition.lang = "pt-BR";
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = function () {
        reconhecimentoRodando = true;
        paradaManualMicrofone = false;

        if (micAtivo && !processando && !falandoAgora) {
          atualizarEstado("ESCUTANDO", "Microfone ativo continuamente");
        }
      };
recognition.onresult = function (event) {
  if (!micAtivo) return;

  const agora = Date.now();

  if (falandoAgora || agora < ignorarResultadoAte) {
    return;
  }

  const resultado = event.results[event.results.length - 1][0];

  const texto = String(
    resultado.transcript || ""
  ).trim();

  if (texto.length < 2) return;

  ultimoTextoUsuario = texto;
  ultimaRespostaOtto = "";
  intensidadeVoz = 1;
  pulsoResposta = 0.8;

  if (detectarComandoPrint(texto)) {
    tirarPrintScreenPorVoz();
    garantirMicrofoneAtivo();
    return;
  }

  const temaDetectado = detectarComandoVisual(texto);

  if (temaDetectado) {
    ativarTema(temaDetectado, true);
    garantirMicrofoneAtivo();
    return;
  }

  enviarPergunta(texto);
};

      recognition.onerror = function (event) {
        reconhecimentoRodando = false;

        if (
          event.error === "not-allowed" ||
          event.error === "service-not-allowed"
        ) {
          atualizarEstado(
            "PERMISSÃO NECESSÁRIA",
            "Libere o microfone no navegador para usar o OTTO"
          );

          audioPermission.classList.add("mostrar");
          return;
        }

        if (event.error === "no-speech") {
          atualizarEstado(
            "ESCUTANDO",
            "Microfone ativo continuamente"
          );

          garantirMicrofoneAtivo();
          return;
        }

        garantirMicrofoneAtivo();
      };

      recognition.onend = function () {
        reconhecimentoRodando = false;

        if (paradaManualMicrofone) {
          return;
        }

        garantirMicrofoneAtivo();
      };
    }

    function iniciarMicrofone() {
      if (!recognition) return;
      if (!micAtivo) return;
      if (reconhecimentoRodando) return;

      try {
        paradaManualMicrofone = false;
        recognition.start();
      } catch (erro) {
        console.warn("Microfone já estava iniciado ou bloqueado:", erro);
      }
    }

    function garantirMicrofoneAtivo() {
      if (!recognition) return;
      if (!micAtivo) return;
      if (reconhecimentoRodando) return;

      clearTimeout(reiniciarMicrofoneTimer);

      reiniciarMicrofoneTimer = setTimeout(function () {
        iniciarMicrofone();
      }, 350);
    }

    function pararMicrofone(manual = true) {
      if (!recognition) return;

      try {
        paradaManualMicrofone = manual;
        recognition.stop();
      } catch (erro) {
        console.warn("Erro ao parar microfone:", erro);
      }

      reconhecimentoRodando = false;
    }

    function escaparHTML(valor) {
      return String(valor ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function sanitizarHTML(html) {
      const template = document.createElement("template");
      template.innerHTML = String(html || "");

      template.content.querySelectorAll("script, iframe, object, embed, link, meta").forEach((el) => {
        el.remove();
      });

      template.content.querySelectorAll("*").forEach((el) => {
        [...el.attributes].forEach((attr) => {
          const nome = attr.name.toLowerCase();
          const valor = String(attr.value || "").toLowerCase();

          if (nome.startsWith("on")) {
            el.removeAttribute(attr.name);
          }

          if ((nome === "href" || nome === "src") && valor.startsWith("javascript:")) {
            el.removeAttribute(attr.name);
          }
        });
      });

      return template.innerHTML;
    }

    function normalizarPayloadResposta(data) {
      const payload = data || {};

      const respostaTexto =
        payload.resposta ||
        payload.mensagem ||
        payload.texto ||
        payload.answer ||
        payload.fala ||
        "";

      const canvasApi =
        payload.canvas ||
        payload.resultado ||
        payload.ui ||
        payload.layout ||
        null;

      return {
        bruto: payload,
        respostaTexto: String(respostaTexto || "Sem resposta."),
        fala: String(payload.fala || respostaTexto || "Resposta gerada."),
        canvas: canvasApi
      };
    }

    function renderizarTextoSimples(texto) {
      const partes = String(texto || "")
        .split(/\n{2,}/)
        .map((p) => p.trim())
        .filter(Boolean);

      if (!partes.length) {
        return "<p>Sem resposta.</p>";
      }

      return partes
        .map((p) => {
          const linha = escaparHTML(p)
            .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
            .replace(/\n/g, "<br>");

          return "<p>" + linha + "</p>";
        })
        .join("");
    }

    function classeValorTabela(valor) {
      const texto = normalizarTexto(valor);

      if (
        texto.includes("acima") ||
        texto.includes("bom") ||
        texto.includes("positivo") ||
        texto.includes("batida") ||
        texto.includes("atingida") ||
        texto.includes("ok")
      ) {
        return "positivo";
      }

      if (
        texto.includes("abaixo") ||
        texto.includes("distante") ||
        texto.includes("critico") ||
        texto.includes("crítico") ||
        texto.includes("negativo") ||
        texto.includes("atencao") ||
        texto.includes("atenção")
      ) {
        return "negativo";
      }

      if (
        texto.includes("alerta") ||
        texto.includes("parcial") ||
        texto.includes("observacao") ||
        texto.includes("observação")
      ) {
        return "alerta";
      }

      return "";
    }

    function renderizarTabela(tabela) {
      if (!tabela) return "";

      const colunas = Array.isArray(tabela.colunas) ? tabela.colunas : [];
      const linhas = Array.isArray(tabela.linhas) ? tabela.linhas : [];

      if (!colunas.length || !linhas.length) return "";

      return `
        <div class="resultado-tabela-wrap">
          <table class="resultado-tabela">
            <thead>
              <tr>
                ${colunas.map((coluna) => `<th>${escaparHTML(coluna.label || coluna.nome || coluna.key || coluna)}</th>`).join("")}
              </tr>
            </thead>

            <tbody>
              ${linhas.map((linha) => {
                return `
                  <tr>
                    ${colunas.map((coluna) => {
                      const chave = coluna.key || coluna.nome || coluna;
                      const valor = linha[chave] ?? "";
                      const classe = classeValorTabela(valor);

                      return `<td class="${classe}">${escaparHTML(valor)}</td>`;
                    }).join("")}
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderizarGraficos(graficos) {

      return graficos.map((grafico, index) => {

          <div class="resultado-grafico-box">

    function montarGraficos(graficos) {
      if (!Array.isArray(graficos) || !graficos.length) return;
      if (typeof Chart === "undefined") return;

      graficos.forEach((grafico, index) => {
        const canvasGrafico = document.getElementById("resultadoGrafico" + index);

        if (!canvasGrafico) return;

        const tipo = grafico.tipo || grafico.type || "bar";

        const labels =
          Array.isArray(grafico.labels)
            ? grafico.labels
            : Array.isArray(grafico.dados)
              ? grafico.dados.map((item) => item.label || item.nome || item.empresa || item.mes || item.data || "")
              : [];

        let datasets = [];

        if (Array.isArray(grafico.datasets)) {
          datasets = grafico.datasets.map((dataset) => {
            return {
              ...dataset,
              borderWidth: dataset.borderWidth || 2,
              tension: dataset.tension ?? 0.35
            };
          });
        } else if (Array.isArray(grafico.dados)) {
          datasets = [
            {
              label: grafico.label || grafico.titulo || "Valor",
              data: grafico.dados.map((item) => Number(item.valor || item.value || item.total || item.percentual || 0)),
              borderWidth: 2,
              tension: 0.35
            }
          ];
        } else if (Array.isArray(grafico.valores)) {
          datasets = [
            {
              label: grafico.label || grafico.titulo || "Valor",
              data: grafico.valores.map((valor) => Number(valor || 0)),
              borderWidth: 2,
              tension: 0.35
            }
          ];
        }

        const chart = new Chart(canvasGrafico, {
          type: tipo,
          data: {
            labels: labels,
            datasets: datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: "index",
              intersect: false
            },
            plugins: {
              legend: {
                display: datasets.length > 1 || tipo === "pie" || tipo === "doughnut",
                labels: {
                  font: {
                    family: "Inter",
                    weight: "700"
                  }
                }
              },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    const valor = context.raw;

                    if (grafico.formato === "moeda") {
                      return " " + Number(valor || 0).toLocaleString("pt-BR", {
                        style: "currency",
                        currency: "BRL"
                      });
                    }

                    if (grafico.formato === "percentual") {
                      return " " + Number(valor || 0).toLocaleString("pt-BR") + "%";
                    }

                    return " " + String(valor);
                  }
                }
              }
            },
            scales: tipo === "pie" || tipo === "doughnut" || tipo === "polarArea" || tipo === "radar"
              ? {}
              : {
                  y: {
                    beginAtZero: true,
                    ticks: {
                      callback: function (valor) {
                        if (grafico.formato === "moeda") {
                          return Number(valor || 0).toLocaleString("pt-BR", {
                            style: "currency",
                            currency: "BRL",
                            maximumFractionDigits: 0
                          });
                        }

                        if (grafico.formato === "percentual") {
                          return valor + "%";
                        }

                        return valor;
                      }
                    }
                  },
                  x: {
                    ticks: {
                      font: {
                        family: "Inter",
                        weight: "700"
                      }
                    }
                  }
                }
          }
        });

        graficosResultado.push(chart);
      });
    }

    function renderizarRespostaAPI(payloadNormalizado) {
      const canvasApi = payloadNormalizado.canvas;
      const texto = payloadNormalizado.respostaTexto;

      graficosResultado.forEach((grafico) => {
        try {
          grafico.destroy();
        } catch (erro) {}
      });

      graficosResultado = [];
      resultadoContent.innerHTML = "";

      ultimaRespostaCompleta = texto;

      if (!canvasApi) {
        resultadoKicker.innerText = "OTTO RESPOSTA";
        resultadoTitulo.innerText = "Resultado";
        resultadoSubtitulo.innerText = "Resposta da central administrativa";
        resultadoBox.dataset.tema = temaAtual || "azul";
        resultadoContent.innerHTML = renderizarTextoSimples(texto);
        abrirResultado();
        return;
      }

      aplicarEstiloResultado(canvasApi.estilo || {});

      resultadoKicker.innerText = canvasApi.kicker || canvasApi.categoria || "OTTO RESULTADO";
      resultadoTitulo.innerText = canvasApi.titulo || canvasApi.title || "Resultado";
      resultadoSubtitulo.innerText = canvasApi.subtitulo || canvasApi.descricao || "Resposta organizada pela API";

      let htmlFinal = "";

      if (canvasApi.html) {
        htmlFinal += `<div class="resultado-html">${sanitizarHTML(canvasApi.html)}</div>`;
      } else {
        htmlFinal += renderizarTextoSimples(canvasApi.texto || texto);
      }

      htmlFinal += renderizarCards(canvasApi.cards);
      htmlFinal += renderizarTabela(canvasApi.tabela);

      if (Array.isArray(canvasApi.tabelas)) {
        canvasApi.tabelas.forEach((tabela) => {
          htmlFinal += renderizarTabela(tabela);
        });
      }

      htmlFinal += renderizarGraficos(canvasApi.graficos);

      resultadoContent.innerHTML = htmlFinal || renderizarTextoSimples(texto);

      abrirResultado();

      setTimeout(() => {
        montarGraficos(canvasApi.graficos);
      }, 80);
    }








function detectarComandoPrint(texto) {
  const t = normalizarTexto(texto);

  return (
    t === "print screen" ||
    t === "print" ||
    t === "tirar print" ||
    t === "tira print" ||
    t === "salvar print" ||
    t === "salva print" ||
    t === "capturar tela" ||
    t === "captura de tela" ||
    t.includes("print screen") ||
    t.includes("tirar print") ||
    t.includes("tira print") ||
    t.includes("salvar print") ||
    t.includes("capturar tela") ||
    t.includes("captura de tela")
  );
}

function gerarNomePrintOtto() {
  const agora = new Date();

  const ano = agora.getFullYear();
  const mes = String(agora.getMonth() + 1).padStart(2, "0");
  const dia = String(agora.getDate()).padStart(2, "0");
  const hora = String(agora.getHours()).padStart(2, "0");
  const minuto = String(agora.getMinutes()).padStart(2, "0");
  const segundo = String(agora.getSeconds()).padStart(2, "0");

  return `OTTO_PRINT_${ano}-${mes}-${dia}_${hora}-${minuto}-${segundo}.png`;
}













    
async function enviarPergunta(texto) {
  if (!texto) return;
  if (processando) return;

  if (detectarComandoPrint(texto)) {
    await tirarPrintScreenPorVoz();
    garantirMicrofoneAtivo();
    return;
  }

  const temaDetectado = detectarComandoVisual(texto);

      if (temaDetectado) {
        await ativarTema(temaDetectado, true);
        garantirMicrofoneAtivo();
        return;
      }

      ultimoTextoUsuario = texto;
      ultimaRespostaOtto = "";
      processando = true;

      atualizarEstado("PROCESSANDO", "OTTO enviando para a central administrativa");
      criarOnda(1);

      try {
        const contexto = await buscarContexto();

        console.log("API CENTRAL:", API_ADMIN_AGENTE);

        const res = await fetch(API_ADMIN_AGENTE, {
          method: "POST",

          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer mercatto_admin_2026"
          },

          body: JSON.stringify({
            pergunta: texto,
            mensagem: texto,
            texto: texto,

            contexto: contexto,

            usuario_id: usuarioLogado.id,
            usuario: usuarioLogado.usuario,
            nome: usuarioLogado.nome,
            empresa: usuarioLogado.empresa,
            telefone: usuarioLogado.telefone || "",
            numero: usuarioLogado.telefone || "",
            email: usuarioLogado.email || "",

            interface: "OTTO_INDEX_CANVAS",
            aceita_canvas: true,
            aceita_html: true,
            aceita_cards: true,
            aceita_tabelas: true,
            aceita_graficos: true,
            tema_atual: temaAtual
          })
        });

        if (!res.ok) {
          throw new Error("Erro HTTP " + res.status);
        }

        const data = await res.json();

        const payloadNormalizado = normalizarPayloadResposta(data);

        const resposta = payloadNormalizado.respostaTexto;
        const falaResposta = payloadNormalizado.fala;

        ultimaRespostaOtto = falaResposta;
        pulsoResposta = 1;

        renderizarRespostaAPI(payloadNormalizado);

        await salvarConversa(
          texto,
          JSON.stringify(data)
        );

        processando = false;

        atualizarEstado("RESPONDENDO", "OTTO entregando a resposta organizada");

        await falar(falaResposta);

        garantirMicrofoneAtivo();

      } catch (erro) {
        console.error(erro);

        const respostaErro =
          "Erro de conexão com a central administrativa do OTTO.";

        ultimaRespostaOtto = respostaErro;
        pulsoResposta = 1;
        processando = false;

        renderizarRespostaAPI({
          respostaTexto: respostaErro,
          fala: respostaErro,
          canvas: {
            kicker: "ERRO",
            titulo: "Falha na conexão",
            subtitulo: "Não foi possível acessar a central administrativa",
            estilo: {
              tema: "vermelho"
            },
            html: `
              <div class="bloco">
                <h2>Erro de conexão</h2>
                <p>A central administrativa do OTTO não respondeu corretamente.</p>
                <p class="negativo">Verifique a rota /api/admin-agente.</p>
              </div>
            `
          }
        });

        atualizarEstado("ERRO DE CONEXÃO", "Falha ao acessar /api/admin-agente");

        await falar(respostaErro);

        garantirMicrofoneAtivo();
      }
    }

    function enviar() {
      const texto = input.value.trim();

      if (!texto) return;

      input.value = "";

      enviarPergunta(texto);
    }

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        enviar();
      }
    });

    function abrirCanvasUrl(url) {
      const layer = document.getElementById("canvasLayer");
      const frame = document.getElementById("canvasFrame");

      frame.src = url;
      layer.classList.add("ativo");

      atualizarEstado("MÓDULO ABERTO", "OTTO exibindo uma interface dentro do canvas");
    }

    function fecharCanvas() {
      const layer = document.getElementById("canvasLayer");
      const frame = document.getElementById("canvasFrame");

      layer.classList.remove("ativo");
      frame.src = "about:blank";

      atualizarEstado(
        micAtivo ? "ESCUTANDO" : "CANVAS LIVRE",
        micAtivo ? "Microfone ativo continuamente" : "Canvas pronto para novas operações"
      );

      garantirMicrofoneAtivo();
    }

    }

    }

      const vozSalva = localStorage.getItem("ottoVozAtiva");
      const micSalvo = localStorage.getItem("ottoMicAtivo");

        vozAtiva = false;
      }

      if (micSalvo === "0") {

      }

    window.fecharCanvas = fecharCanvas;

    window.fecharDiretoria = fecharDiretoria;
window.ativarTema = ativarTema;
window.tirarPrintScreenPorVoz = tirarPrintScreenPorVoz;
window.enviar = enviar;
window.enviarPergunta = enviarPergunta;
window.garantirMicrofoneAtivo = garantirMicrofoneAtivo;
    window.fecharResultado = fecharResultado;
    window.copiarResultado = copiarResultado;
    window.limparResultadoVisual = limparResultadoVisual;

    async function iniciarOtto() {
      carregarPreferenciasLocais();

      ajustarCanvas();
      prepararReconhecimento();
      atualizarBotoes();

      await ativarTema(temaAtual, false);

      const nome =
        usuarioLogado.nome ||
        usuarioLogado.usuario ||
        "diretoria";

      ultimaRespostaOtto =
        obterSaudacao() +
        ", " +
        nome +
        ". OTTO online. Microfone ativo continuamente.";

      setTimeout(async function () {
        try {
          if (vozAtiva || micAtivo) {
            await liberarAudioEEntrada();
          }
        } catch (erro) {
          audioPermission.classList.add("mostrar");
        }
      }, 700);

      setTimeout(function () {
        if (!audioLiberado && (vozAtiva || micAtivo)) {
          audioPermission.classList.add("mostrar");
        }
      }, 1400);

      setTimeout(function () {
        garantirMicrofoneAtivo();
      }, 900);

      animar();
    }

    window.addEventListener("resize", ajustarCanvas);

    document.addEventListener("click", function () {
      if (!audioLiberado) {
        liberarAudioEEntrada();
      } else {
        garantirMicrofoneAtivo();
      }
    }, { once: true });

    document.addEventListener("touchstart", function () {
      if (!audioLiberado) {
        liberarAudioEEntrada();
      } else {
        garantirMicrofoneAtivo();
      }
    }, { once: true });

    document.addEventListener("visibilitychange", function () {
      if (document.hidden) {
        paradaManualMicrofone = false;
      } else {
        garantirMicrofoneAtivo();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        fecharResultado();
        fecharCanvas();
      }
    });

    iniciarOtto();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("./sw.js")
          .then(function () {
            console.log("PWA OK");
          })
          .catch(function (erro) {
            console.log("Erro PWA:", erro);
          });
      });
    }
