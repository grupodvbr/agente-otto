<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#dbeafe">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OTTO">

  <link rel="apple-touch-icon" href="icon-192.png">

  <title>OTTO • CENTRAL EXECUTIVA</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <style>
    :root {
      --texto: #0f172a;
      --texto-suave: #475569;
      --branco: #ffffff;

      --azul-700: #1d4ed8;
      --vermelho-700: #b91c1c;
      --dourado-700: #b45309;
      --verde-700: #047857;
      --roxo-700: #6d28d9;
      --preto-900: #020617;

      --sombra-forte: 0 40px 120px rgba(15, 23, 42, 0.28);
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Inter", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      color: var(--texto);
      background:
        radial-gradient(circle at 15% 15%, rgba(96, 165, 250, 0.55), transparent 28%),
        radial-gradient(circle at 85% 80%, rgba(34, 211, 238, 0.42), transparent 32%),
        linear-gradient(135deg, #f8fbff 0%, #eaf6ff 35%, #dbeafe 100%);
    }

    body {
      position: fixed;
      inset: 0;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .otto-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.04));
    }

    #ottoCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0.16;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.25) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.25) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 78%);
    }

    .glow-top {
      position: fixed;
      width: 54vw;
      height: 54vw;
      min-width: 440px;
      min-height: 440px;
      border-radius: 999px;
      top: -24vw;
      left: -18vw;
      z-index: 0;
      background: rgba(96, 165, 250, 0.42);
      filter: blur(70px);
      animation: orbTop 12s ease-in-out infinite;
      will-change: transform;
    }

    .glow-bottom {
      position: fixed;
      width: 52vw;
      height: 52vw;
      min-width: 420px;
      min-height: 420px;
      border-radius: 999px;
      right: -20vw;
      bottom: -22vw;
      z-index: 0;
      background: rgba(34, 211, 238, 0.35);
      filter: blur(76px);
      animation: orbBottom 14s ease-in-out infinite;
      will-change: transform;
    }

    @keyframes orbTop {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(60px, 50px, 0) scale(1.08);
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    @keyframes orbBottom {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }

      50% {
        transform: translate3d(-50px, -40px, 0) scale(1.1);
      }

      100% {
        transform: translate3d(0, 0, 0) scale(1);
      }
    }

    .controls {
      position: fixed;
      top: max(22px, var(--safe-top));
      right: max(22px, var(--safe-right));
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .otto-btn {
      width: 62px;
      height: 62px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 22px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.46));
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      box-shadow:
        0 18px 36px rgba(37, 99, 235, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--azul-700);
      font-size: 25px;
      transition: transform 0.22s ease, box-shadow 0.22s ease, opacity 0.22s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
    }

    .otto-btn::before {
      content: "";
      position: absolute;
      inset: -80%;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.65) 45%, transparent 70%);
      transform: translateX(-55%) rotate(15deg);
      transition: 0.5s ease;
      pointer-events: none;
    }

    .otto-btn:hover {
      transform: translateY(-3px) scale(1.035);
      box-shadow:
        0 24px 52px rgba(37, 99, 235, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .otto-btn:hover::before {
      transform: translateX(65%) rotate(15deg);
    }

    .otto-btn.off {
      color: #94a3b8 !important;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.62), rgba(226, 232, 240, 0.42));
      box-shadow:
        0 12px 24px rgba(15, 23, 42, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .otto-btn.active-pulse::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 18px;
      border: 1px solid currentColor;
      opacity: 0.42;
      animation: btnPulse 1.2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes btnPulse {
      0% {
        transform: scale(0.94);
        opacity: 0.18;
      }

      50% {
        transform: scale(1.12);
        opacity: 0.5;
      }

      100% {
        transform: scale(0.94);
        opacity: 0.18;
      }
    }

    .status-pill {
      position: fixed;
      top: max(22px, var(--safe-top));
      left: max(22px, var(--safe-left));
      z-index: 26;
      max-width: min(420px, calc(100% - 180px));
      padding: 12px 16px;
      border-radius: 999px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .86), rgba(255, 255, 255, .45));
      border: 1px solid rgba(255, 255, 255, .82);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 0 16px 38px rgba(15, 23, 42, .11);
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: none;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #22c55e;
      box-shadow: 0 0 0 6px rgba(34, 197, 94, .14);
      flex: 0 0 auto;
    }

    .status-text {
      font-size: 12px;
      font-weight: 900;
      color: #0f172a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entrada-invisivel {
      position: fixed;
      left: -9999px;
      top: -9999px;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    .resultado-layer {
      position: fixed;
      inset: 0;
      z-index: 18;
      display: none;
      padding: 28px;
      pointer-events: none;
    }

    .resultado-layer.ativo {
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .resultado-box {
      width: min(1240px, 100%);
      max-height: min(76dvh, 790px);
      overflow: hidden;
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.72));
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-shadow:
        0 38px 110px rgba(15, 23, 42, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      pointer-events: auto;
      display: flex;
      flex-direction: column;
      animation: subirResultado .25s ease both;
    }

    @keyframes subirResultado {
      from {
        opacity: 0;
        transform: translateY(28px) scale(.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .resultado-header {
      padding: 20px 22px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.22);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background:
        linear-gradient(135deg, rgba(239, 246, 255, 0.82), rgba(255, 255, 255, 0.42));
    }

    .resultado-titulo-area {
      min-width: 0;
    }

    .resultado-kicker {
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #2563eb;
      margin-bottom: 4px;
    }

    .resultado-titulo {
      font-size: clamp(18px, 2.4vw, 30px);
      font-weight: 950;
      color: #0f172a;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }

    .resultado-subtitulo {
      margin-top: 5px;
      font-size: 13px;
      font-weight: 750;
      color: #64748b;
      overflow-wrap: anywhere;
    }

    .resultado-acoes {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
    }

    .resultado-mini-btn {
      height: 46px;
      min-width: 46px;
      padding: 0 14px;
      border: none;
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.92);
      color: #0f172a;
      font-size: 13px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .12);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      white-space: nowrap;
    }

    .resultado-fechar {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 17px;
      background: rgba(255, 255, 255, 0.92);
      color: #0f172a;
      font-size: 24px;
      font-weight: 950;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(15, 23, 42, .14);
      flex: 0 0 auto;
    }

    .resultado-content {
      padding: 22px;
      overflow: auto;
      color: #0f172a;
      font-size: 15px;
      line-height: 1.55;
      scroll-behavior: smooth;
    }

    .resultado-content::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .resultado-content::-webkit-scrollbar-thumb {
      background: rgba(100, 116, 139, .35);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: padding-box;
    }

    .resultado-content h1,
    .resultado-content h2,
    .resultado-content h3 {
      line-height: 1.15;
      margin-bottom: 12px;
      color: #0f172a;
    }

    .resultado-content h1 {
      font-size: clamp(24px, 3vw, 38px);
      font-weight: 950;
    }

    .resultado-content h2 {
      font-size: clamp(20px, 2.4vw, 30px);
      font-weight: 930;
    }

    .resultado-content h3 {
      font-size: clamp(17px, 2vw, 23px);
      font-weight: 880;
    }

    .resultado-content p {
      margin: 0 0 12px;
      color: #334155;
      font-weight: 620;
    }

    .resultado-content strong {
      color: #0f172a;
      font-weight: 950;
    }

    .resultado-content ul,
    .resultado-content ol {
      padding-left: 22px;
      margin: 10px 0 16px;
      color: #334155;
      font-weight: 650;
    }

    .resultado-content li {
      margin-bottom: 8px;
    }

    .resultado-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 14px;
      margin: 14px 0;
    }

    .resultado-card {
      grid-column: span 3;
      border-radius: 24px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.95), rgba(248, 250, 252, 0.86));
      border: 1px solid rgba(226, 232, 240, .9);
      box-shadow: 0 16px 38px rgba(15, 23, 42, .08);
      min-width: 0;
    }

    .resultado-card-label {
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #64748b;
      margin-bottom: 8px;
      overflow-wrap: anywhere;
    }

    .resultado-card-valor {
      font-size: clamp(20px, 2.4vw, 34px);
      font-weight: 950;
      color: #0f172a;
      line-height: 1.02;
      overflow-wrap: anywhere;
    }

    .resultado-card-desc {
      margin-top: 8px;
      font-size: 12px;
      font-weight: 780;
      color: #64748b;
      overflow-wrap: anywhere;
    }

    .resultado-tabela-wrap {
      width: 100%;
      overflow: auto;
      border-radius: 22px;
      border: 1px solid rgba(226, 232, 240, .95);
      box-shadow: 0 16px 38px rgba(15, 23, 42, .07);
      margin: 16px 0;
      background: white;
    }

    .resultado-tabela {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
      background: white;
    }

    .resultado-tabela th {
      text-align: left;
      padding: 14px 16px;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .07em;
      font-weight: 950;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .resultado-tabela td {
      padding: 14px 16px;
      border-top: 1px solid #e2e8f0;
      color: #0f172a;
      font-size: 14px;
      font-weight: 720;
      white-space: nowrap;
    }

    .resultado-tabela tr:nth-child(even) td {
      background: #f8fafc;
    }

    .resultado-tabela .positivo {
      color: #047857;
      font-weight: 950;
    }

    .resultado-tabela .negativo {
      color: #b91c1c;
      font-weight: 950;
    }

    .resultado-tabela .alerta {
      color: #b45309;
      font-weight: 950;
    }

    .resultado-grafico-box {
      margin: 18px 0;
      padding: 18px;
      border-radius: 26px;
      background: rgba(255, 255, 255, .94);
      border: 1px solid rgba(226, 232, 240, .95);
      box-shadow: 0 16px 42px rgba(15, 23, 42, .08);
    }

    .resultado-grafico-titulo {
      font-size: 16px;
      font-weight: 950;
      color: #0f172a;
      margin-bottom: 12px;
    }

    .resultado-grafico-canvas {
      width: 100% !important;
      height: 330px !important;
    }

    .resultado-html {
      display: block;
    }

    .resultado-html .bloco {
      padding: 16px;
      border-radius: 22px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      margin-bottom: 12px;
    }

    .resultado-html .positivo,
    .positivo {
      color: #047857;
      font-weight: 950;
    }

    .resultado-html .negativo,
    .negativo {
      color: #b91c1c;
      font-weight: 950;
    }

    .resultado-html .alerta,
    .alerta {
      color: #b45309;
      font-weight: 950;
    }

    .resultado-box[data-tema="escuro"],
    .resultado-box[data-tema="preto"],
    .resultado-box[data-tema="executivo"] {
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.96), rgba(30, 41, 59, 0.88));
      border-color: rgba(148, 163, 184, .26);
    }

    .resultado-box[data-tema="escuro"] .resultado-header,
    .resultado-box[data-tema="preto"] .resultado-header,
    .resultado-box[data-tema="executivo"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.94), rgba(30, 41, 59, 0.62));
      border-bottom-color: rgba(148, 163, 184, .22);
    }

    .resultado-box[data-tema="escuro"] .resultado-titulo,
    .resultado-box[data-tema="escuro"] .resultado-content,
    .resultado-box[data-tema="escuro"] .resultado-card-valor,
    .resultado-box[data-tema="escuro"] .resultado-content h1,
    .resultado-box[data-tema="escuro"] .resultado-content h2,
    .resultado-box[data-tema="escuro"] .resultado-content h3,
    .resultado-box[data-tema="preto"] .resultado-titulo,
    .resultado-box[data-tema="preto"] .resultado-content,
    .resultado-box[data-tema="preto"] .resultado-card-valor,
    .resultado-box[data-tema="preto"] .resultado-content h1,
    .resultado-box[data-tema="preto"] .resultado-content h2,
    .resultado-box[data-tema="preto"] .resultado-content h3,
    .resultado-box[data-tema="executivo"] .resultado-titulo,
    .resultado-box[data-tema="executivo"] .resultado-content,
    .resultado-box[data-tema="executivo"] .resultado-card-valor,
    .resultado-box[data-tema="executivo"] .resultado-content h1,
    .resultado-box[data-tema="executivo"] .resultado-content h2,
    .resultado-box[data-tema="executivo"] .resultado-content h3 {
      color: #f8fafc;
    }

    .resultado-box[data-tema="escuro"] .resultado-subtitulo,
    .resultado-box[data-tema="escuro"] .resultado-content p,
    .resultado-box[data-tema="escuro"] .resultado-card-label,
    .resultado-box[data-tema="escuro"] .resultado-card-desc,
    .resultado-box[data-tema="preto"] .resultado-subtitulo,
    .resultado-box[data-tema="preto"] .resultado-content p,
    .resultado-box[data-tema="preto"] .resultado-card-label,
    .resultado-box[data-tema="preto"] .resultado-card-desc,
    .resultado-box[data-tema="executivo"] .resultado-subtitulo,
    .resultado-box[data-tema="executivo"] .resultado-content p,
    .resultado-box[data-tema="executivo"] .resultado-card-label,
    .resultado-box[data-tema="executivo"] .resultado-card-desc {
      color: #cbd5e1;
    }

    .resultado-box[data-tema="escuro"] .resultado-card,
    .resultado-box[data-tema="escuro"] .resultado-grafico-box,
    .resultado-box[data-tema="escuro"] .resultado-html .bloco,
    .resultado-box[data-tema="preto"] .resultado-card,
    .resultado-box[data-tema="preto"] .resultado-grafico-box,
    .resultado-box[data-tema="preto"] .resultado-html .bloco,
    .resultado-box[data-tema="executivo"] .resultado-card,
    .resultado-box[data-tema="executivo"] .resultado-grafico-box,
    .resultado-box[data-tema="executivo"] .resultado-html .bloco {
      background: rgba(30, 41, 59, .86);
      border-color: rgba(148, 163, 184, .22);
    }

    .resultado-box[data-tema="dourado"] .resultado-kicker {
      color: #b45309;
    }

    .resultado-box[data-tema="dourado"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(255, 251, 235, .95), rgba(254, 243, 199, .62));
    }

    .resultado-box[data-tema="dourado"] .resultado-tabela th {
      background: #fffbeb;
      color: #92400e;
    }

    .resultado-box[data-tema="vermelho"] .resultado-kicker {
      color: #b91c1c;
    }

    .resultado-box[data-tema="vermelho"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(255, 241, 242, .95), rgba(254, 205, 211, .58));
    }

    .resultado-box[data-tema="vermelho"] .resultado-tabela th {
      background: #fff1f2;
      color: #991b1b;
    }

    .resultado-box[data-tema="verde"] .resultado-kicker {
      color: #047857;
    }

    .resultado-box[data-tema="verde"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(236, 253, 245, .95), rgba(209, 250, 229, .58));
    }

    .resultado-box[data-tema="verde"] .resultado-tabela th {
      background: #ecfdf5;
      color: #065f46;
    }

    .resultado-box[data-tema="roxo"] .resultado-kicker {
      color: #6d28d9;
    }

    .resultado-box[data-tema="roxo"] .resultado-header {
      background:
        linear-gradient(135deg, rgba(245, 243, 255, .95), rgba(221, 214, 254, .58));
    }

    .resultado-box[data-tema="roxo"] .resultado-tabela th {
      background: #f5f3ff;
      color: #5b21b6;
    }



    .resultado-box[data-tema="leonardo"] {
      background:
        radial-gradient(circle at 10% 0%, rgba(251, 191, 36, 0.22), transparent 34%),
        radial-gradient(circle at 92% 12%, rgba(245, 158, 11, 0.18), transparent 36%),
        linear-gradient(135deg, rgba(2, 6, 23, 0.98), rgba(23, 16, 3, 0.94) 46%, rgba(69, 42, 5, 0.88));

    function getTema() {
      return TEMAS[temaAtual] || TEMAS.azul;
    }

    function atualizarStatusVisual() {
      statusText.innerText = estadoOtto + (subEstadoOtto ? " • " + subEstadoOtto : "");

      if (processando) {
        statusDot.style.background = "#f59e0b";
        statusDot.style.boxShadow = "0 0 0 6px rgba(245,158,11,.16)";
        return;
      }

      if (estadoOtto.toLowerCase().includes("erro")) {
        statusDot.style.background = "#ef4444";
        statusDot.style.boxShadow = "0 0 0 6px rgba(239,68,68,.16)";
        return;
      }

      if (micAtivo) {
        statusDot.style.background = "#22c55e";
        statusDot.style.boxShadow = "0 0 0 6px rgba(34,197,94,.14)";
      } else {
        statusDot.style.background = "#94a3b8";
        statusDot.style.boxShadow = "0 0 0 6px rgba(148,163,184,.16)";
      }
    }

    function mostrarToast(texto) {
      clearTimeout(toastTimer);

      toastOtto.innerText = texto;
      toastOtto.classList.add("ativo");

      toastTimer = setTimeout(function () {
        toastOtto.classList.remove("ativo");
      }, 2600);
    }

    function ajustarCanvas() {
      escalaPixel = Math.max(
        1,
        Math.min(2, window.devicePixelRatio || 1)
      );

      largura = window.innerWidth;
      altura = window.innerHeight;

      canvas.width = Math.floor(largura * escalaPixel);
      canvas.height = Math.floor(altura * escalaPixel);

      canvas.style.width = largura + "px";
      canvas.style.height = altura + "px";

      ctx.setTransform(
        escalaPixel,
        0,
        0,
        escalaPixel,
        0,
        0
      );

      centroX = largura / 2;
      centroY = altura / 2;

      criarElementosVisuais();
    }

    function criarElementosVisuais() {
      particulas = [];
      ondas = [];
      linhas = [];
      estrelas = [];
      cifras = [];
      fagulhas = [];
      raios = [];
      chuva = [];

      const mobile = largura < 768;
      const totalParticulas = mobile ? 62 : 130;
      const totalLinhas = mobile ? 14 : 32;
      const totalEstrelas = mobile ? 46 : 96;

      const totalFagulhas = mobile ? 30 : 76;
      const totalRaios = mobile ? 8 : 18;
      const totalChuva = mobile ? 60 : 150;

      for (let i = 0; i < totalParticulas; i++) {
        particulas.push({
          x: Math.random() * largura,
          y: Math.random() * altura,
          r: 0.8 + Math.random() * 2.4,
          vx: -0.25 + Math.random() * 0.5,
          vy: -0.25 + Math.random() * 0.5,
          a: 0.12 + Math.random() * 0.32,
          fase: Math.random() * Math.PI * 2
        });
      }

      for (let i = 0; i < totalLinhas; i++) {
        linhas.push({
          x1: Math.random() * largura,
          y1: Math.random() * altura,
          x2: Math.random() * largura,
          y2: Math.random() * altura,
          a: 0.04 + Math.random() * 0.1,
          v: 0.2 + Math.random() * 0.8
        });
      }

      for (let i = 0; i < totalEstrelas; i++) {
        estrelas.push({
          angulo: Math.random() * Math.PI * 2,
          raio: 120 + Math.random() * Math.min(largura, altura) * 0.46,
          tamanho: 1 + Math.random() * 2.5,
          velocidade: 0.0008 + Math.random() * 0.0022,
          alpha: 0.12 + Math.random() * 0.38
        });
      }

      for (let i = 0; i < totalCifras; i++) {
        cifras.push({
          x: Math.random() * largura,
          y: Math.random() * altura - altura,
          texto: Math.random() > 0.32 ? "$" : "R$",
          tamanho: 18 + Math.random() * 42,
          velocidade: 0.9 + Math.random() * 2.4,
          alpha: 0.12 + Math.random() * 0.36,
          giro: Math.random() * Math.PI * 2,
          giroVel: -0.01 + Math.random() * 0.02
        });
      }

      for (let i = 0; i < totalFagulhas; i++) {
        fagulhas.push({
          x: Math.random() * largura,
          y: Math.random() * altura,
          tamanho: 1 + Math.random() * 3,
          velocidade: 0.5 + Math.random() * 1.8,
          alpha: 0.1 + Math.random() * 0.35,
          fase: Math.random() * Math.PI * 2
        });
      }

      for (let i = 0; i < totalRaios; i++) {
        raios.push({
          x: Math.random() * largura,
          y: Math.random() * altura,
          comprimento: 80 + Math.random() * 260,
          velocidade: 1 + Math.random() * 3,
          alpha: 0.04 + Math.random() * 0.14,
          inclinacao: -0.45 + Math.random() * 0.9
        });
      }

      for (let i = 0; i < totalChuva; i++) {
        chuva.push({
          x: Math.random() * largura,
          y: Math.random() * altura,
          tamanho: 8 + Math.random() * 26,
          velocidade: 1.4 + Math.random() * 4,
          alpha: 0.06 + Math.random() * 0.18
        });
      }
    }

    function arredondarRetangulo(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function desenharFundo() {
      const tema = getTema();

      const grad = ctx.createLinearGradient(0, 0, largura, altura);

      grad.addColorStop(0, tema.fundo1);
      grad.addColorStop(0.32, tema.fundo2);
      grad.addColorStop(0.68, tema.fundo3);
      grad.addColorStop(1, tema.fundo4);

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, largura, altura);

      const g1 = ctx.createRadialGradient(
        largura * 0.18,
        altura * 0.18,
        0,
        largura * 0.18,
        altura * 0.18,
        largura * 0.55
      );

      g1.addColorStop(0, "rgba(" + tema.destaque + ",0.46)");
      g1.addColorStop(0.42, "rgba(" + tema.destaque + ",0.16)");
      g1.addColorStop(1, "rgba(" + tema.destaque + ",0)");

      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, largura, altura);

      const g2 = ctx.createRadialGradient(
        largura * 0.86,
        altura * 0.84,
        0,
        largura * 0.86,
        altura * 0.84,
        largura * 0.48
      );

      g2.addColorStop(0, "rgba(" + tema.secundario + ",0.40)");
      g2.addColorStop(0.5, "rgba(" + tema.secundario + ",0.14)");
      g2.addColorStop(1, "rgba(" + tema.secundario + ",0)");

      ctx.fillStyle = g2;
      ctx.fillRect(0, 0, largura, altura);
    }

    function desenharGrade() {
      const tema = getTema();
      const espacamento = largura < 768 ? 44 : 58;

      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.strokeStyle = "rgba(" + tema.grid + ",0.20)";
      ctx.lineWidth = 1;

      for (let x = -espacamento; x <= largura + espacamento; x += espacamento) {
        ctx.beginPath();
        ctx.moveTo(x + Math.sin(tempo * 0.008) * 6, 0);
        ctx.lineTo(x - Math.sin(tempo * 0.008) * 6, altura);
        ctx.stroke();
      }

      for (let y = -espacamento; y <= altura + espacamento; y += espacamento) {
        ctx.beginPath();
        ctx.moveTo(0, y + Math.cos(tempo * 0.008) * 6);
        ctx.lineTo(largura, y - Math.cos(tempo * 0.008) * 6);
        ctx.stroke();
      }

      ctx.restore();
    }

    function desenharParticulas() {
      const tema = getTema();

      ctx.save();

      particulas.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.fase += 0.018;

        if (p.x < -20) p.x = largura + 20;
        if (p.x > largura + 20) p.x = -20;
        if (p.y < -20) p.y = altura + 20;
        if (p.y > altura + 20) p.y = -20;

        const alpha = p.a + Math.sin(p.fase) * 0.08;

        ctx.beginPath();
        ctx.fillStyle = "rgba(" + tema.particula + "," + Math.max(0.04, alpha) + ")";
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    function desenharLinhas() {
      const tema = getTema();

      ctx.save();

      linhas.forEach((l) => {
        l.y1 += l.v * 0.08;
        l.y2 += l.v * 0.08;

        if (l.y1 > altura + 80) l.y1 = -80;
        if (l.y2 > altura + 80) l.y2 = -80;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.primario + "," + l.a + ")";
        ctx.lineWidth = 1;
        ctx.moveTo(l.x1, l.y1);
        ctx.lineTo(l.x2, l.y2);
        ctx.stroke();
      });

      ctx.restore();
    }

    function desenharFagulhas() {
      const tema = getTema();

      if (!tema.modoFagulha) return;

      ctx.save();

      fagulhas.forEach((f) => {
        f.y -= f.velocidade;
        f.x += Math.sin(tempo * 0.025 + f.fase) * 0.45;
        f.fase += 0.015;

        if (f.y < -20) {
          f.y = altura + 20;
          f.x = Math.random() * largura;
        }

        const alpha = f.alpha + Math.sin(f.fase) * 0.08;

        ctx.beginPath();
        ctx.fillStyle = "rgba(" + tema.destaque + "," + Math.max(0.04, alpha) + ")";
        ctx.arc(f.x, f.y, f.tamanho, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.restore();
    }

    function desenharCifroes() {
      const tema = getTema();

      if (!tema.modoCifrao) return;

      ctx.save();

      cifras.forEach((c) => {
        c.y += c.velocidade;
        c.giro += c.giroVel;

        if (c.y > altura + 80) {
          c.y = -90;
          c.x = Math.random() * largura;
          c.tamanho = 18 + Math.random() * 42;
          c.velocidade = 0.9 + Math.random() * 2.4;
          c.alpha = 0.12 + Math.random() * 0.36;
          c.texto = Math.random() > 0.32 ? "$" : "R$";
        }

        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.giro);

        ctx.font = "900 " + c.tamanho + "px Inter, Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(217,119,6," + c.alpha + ")";
        ctx.shadowColor = "rgba(251,191,36,0.35)";
        ctx.shadowBlur = 16;
        ctx.fillText(c.texto, 0, 0);

        ctx.restore();
      });

      ctx.restore();
    }

    function desenharModoLeonardoDetalhes() {
      const tema = getTema();

      if (!tema.modoPatinhas) return;

      ctx.save();

      const menor = Math.min(largura, altura);
      const baseY = centroY + Math.max(118, menor * 0.18);
      const tamanhoMoeda = Math.max(28, Math.min(62, menor * 0.06));
      const tempoMoeda = tempo * 0.018;

      for (let i = 0; i < 9; i++) {
        const angulo = tempoMoeda + (i * Math.PI * 2) / 9;
        const raio = Math.max(150, menor * 0.28) + Math.sin(tempo * 0.016 + i) * 14;
        const x = centroX + Math.cos(angulo) * raio;
        const y = centroY + Math.sin(angulo) * raio * 0.36;

        ctx.beginPath();
        ctx.fillStyle = "rgba(251,191,36,0.18)";
        ctx.strokeStyle = "rgba(253,224,71,0.38)";
        ctx.lineWidth = 2;
        ctx.arc(x, y, tamanhoMoeda * 0.42, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.font = "900 " + Math.max(14, tamanhoMoeda * 0.42) + "px Inter, Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillStyle = "rgba(255,247,214,0.72)";
        ctx.fillText(i % 2 === 0 ? "R$" : "$", x, y);
      }

      ctx.font = "900 " + Math.max(18, Math.min(34, menor * 0.032)) + "px Inter, Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(251,191,36,.55)";
      ctx.shadowBlur = 24;
      ctx.fillStyle = "rgba(255,247,214,.92)";

      ctx.restore();
    }


    function desenharModoYaneDetalhes() {
      const tema = getTema();

      if (!tema.modoYane) return;

      ctx.save();

      const menor = Math.min(largura, altura);
      const baseY = centroY + Math.max(118, menor * 0.18);
      const tempoYane = tempo * 0.018;
      const raioBase = Math.max(145, menor * 0.27);

      function silhuetaDiamante(x, y, s, alpha) {
        ctx.save();
        ctx.translate(x, y);
        ctx.beginPath();
        ctx.moveTo(0, -s * 0.62);
        ctx.lineTo(s * 0.56, -s * 0.10);
        ctx.lineTo(0, s * 0.68);
        ctx.lineTo(-s * 0.56, -s * 0.10);
        ctx.closePath();
        ctx.fillStyle = "rgba(244,114,182," + (alpha * 0.18) + ")";
        ctx.strokeStyle = "rgba(190,24,93," + (alpha * 0.62) + ")";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-s * 0.30, -s * 0.10);
        ctx.lineTo(0, s * 0.68);
        ctx.lineTo(s * 0.30, -s * 0.10);
        ctx.strokeStyle = "rgba(251,207,232," + (alpha * 0.52) + ")";
        ctx.stroke();
        ctx.restore();
      }

      function silhuetaCoroa(x, y, s, alpha) {
        ctx.save();
        ctx.translate(x, y);
        ctx.beginPath();
        ctx.moveTo(-s * 0.70, s * 0.34);
        ctx.lineTo(-s * 0.58, -s * 0.22);
        ctx.lineTo(-s * 0.20, s * 0.06);
        ctx.lineTo(0, -s * 0.46);
        ctx.lineTo(s * 0.20, s * 0.06);
        ctx.lineTo(s * 0.58, -s * 0.22);
        ctx.lineTo(s * 0.70, s * 0.34);
        ctx.closePath();
        ctx.fillStyle = "rgba(251,207,232," + (alpha * 0.20) + ")";
        ctx.strokeStyle = "rgba(219,39,119," + (alpha * 0.64) + ")";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-s * 0.62, s * 0.36);
        ctx.lineTo(s * 0.62, s * 0.36);
        ctx.strokeStyle = "rgba(190,24,93," + (alpha * 0.70) + ")";
        ctx.stroke();
        ctx.restore();
      }

      function silhuetaBolsa(x, y, s, alpha) {
        ctx.save();
        ctx.translate(x, y);
        const w = s * 1.05;
        const h = s * 0.72;
        const r = s * 0.14;
        ctx.beginPath();
        ctx.roundRect(-w / 2, -h / 6, w, h, r);
        ctx.fillStyle = "rgba(244,114,182," + (alpha * 0.16) + ")";
        ctx.strokeStyle = "rgba(190,24,93," + (alpha * 0.62) + ")";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, -h / 6, s * 0.28, Math.PI, Math.PI * 2);
        ctx.strokeStyle = "rgba(251,207,232," + (alpha * 0.62) + ")";
        ctx.stroke();
        ctx.restore();
      }

      function silhuetaLaco(x, y, s, alpha) {
        ctx.save();
        ctx.translate(x, y);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-s * 0.25, -s * 0.35, -s * 0.72, -s * 0.24, -s * 0.68, s * 0.10);
        ctx.bezierCurveTo(-s * 0.62, s * 0.42, -s * 0.18, s * 0.30, 0, 0);
        ctx.bezierCurveTo(s * 0.18, s * 0.30, s * 0.62, s * 0.42, s * 0.68, s * 0.10);
        ctx.bezierCurveTo(s * 0.72, -s * 0.24, s * 0.25, -s * 0.35, 0, 0);
        ctx.closePath();
        ctx.fillStyle = "rgba(251,207,232," + (alpha * 0.20) + ")";
        ctx.strokeStyle = "rgba(219,39,119," + (alpha * 0.62) + ")";
        ctx.lineWidth = 2;
        ctx.fill();
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.12, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(190,24,93," + (alpha * 0.55) + ")";
        ctx.fill();
        ctx.restore();
      }

      for (let i = 0; i < 14; i++) {
        const angulo = tempoYane + (i * Math.PI * 2) / 14;
        const raio = raioBase + Math.sin(tempo * 0.014 + i) * 16;
        const x = centroX + Math.cos(angulo) * raio;
        const y = centroY + Math.sin(angulo) * raio * 0.38;
        const tam = Math.max(22, Math.min(46, menor * 0.042)) + Math.sin(tempo * 0.022 + i) * 2.8;
        const alpha = 0.72 + Math.sin(tempo * 0.018 + i) * 0.16;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(Math.sin(tempo * 0.010 + i) * 0.16);
        ctx.shadowColor = "rgba(244,114,182,.45)";
        ctx.shadowBlur = 18;
        ctx.translate(-x, -y);

        if (i % 4 === 0) silhuetaDiamante(x, y, tam, alpha);
        if (i % 4 === 1) silhuetaCoroa(x, y, tam, alpha);
        if (i % 4 === 2) silhuetaBolsa(x, y, tam, alpha);
        if (i % 4 === 3) silhuetaLaco(x, y, tam, alpha);

        ctx.restore();
      }

      for (let i = 0; i < 22; i++) {
        const angulo = tempo * 0.006 + i * 0.58;
        const distancia = Math.max(88, menor * 0.18) + (i % 5) * 18;
        const x = centroX + Math.cos(angulo) * distancia;
        const y = centroY + Math.sin(angulo * 1.24) * distancia * 0.34;
        const s = 5 + (i % 4) * 1.5;

        ctx.beginPath();
        ctx.moveTo(x, y - s);
        ctx.lineTo(x + s, y);
        ctx.lineTo(x, y + s);
        ctx.lineTo(x - s, y);
        ctx.closePath();
        ctx.fillStyle = "rgba(251,207,232,0.30)";
        ctx.strokeStyle = "rgba(219,39,119,0.30)";
        ctx.lineWidth = 1;
        ctx.fill();
        ctx.stroke();
      }

      ctx.font = "900 " + Math.max(17, Math.min(32, menor * 0.030)) + "px Inter, Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(244,114,182,.50)";
      ctx.shadowBlur = 22;
      ctx.fillStyle = "rgba(255,241,248,.94)";

      ctx.restore();
    }

    function desenharRaios() {
      const tema = getTema();

      if (!tema.modoRaio) return;

      ctx.save();

      raios.forEach((r) => {
        r.y += r.velocidade;
        r.x += r.inclinacao;

        if (r.y > altura + r.comprimento) {
          r.y = -r.comprimento;
          r.x = Math.random() * largura;
        }

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.destaque + "," + r.alpha + ")";
        ctx.lineWidth = 1;
        ctx.moveTo(r.x, r.y);
        ctx.lineTo(r.x + r.inclinacao * 40, r.y + r.comprimento);
        ctx.stroke();
      });

      ctx.restore();
    }

    function desenharChuva() {
      const tema = getTema();

      if (!tema.modoChuva) return;

      ctx.save();

      chuva.forEach((p) => {
        p.y += p.velocidade;

        if (p.y > altura + 30) {
          p.y = -30;
          p.x = Math.random() * largura;
        }

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.secundario + "," + p.alpha + ")";
        ctx.lineWidth = 1;
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p.x, p.y + p.tamanho);
        ctx.stroke();
      });

      ctx.restore();
    }

    function desenharNucleo() {
      const tema = getTema();

      const menor = Math.min(largura, altura);
      const base = Math.max(120, Math.min(250, menor * 0.22));
      const respiracao = Math.sin(tempo * 0.035) * 8;
      const raio = base + respiracao + intensidadeVoz * 16 + pulsoResposta * 18;

      ctx.save();

      for (let i = 0; i < estrelas.length; i++) {
        const e = estrelas[i];

        e.angulo += e.velocidade * (1 + nivelEnergia * 2.2);

        const dist = e.raio + Math.sin(tempo * 0.01 + i) * 10;
        const x = centroX + Math.cos(e.angulo) * dist;
        const y = centroY + Math.sin(e.angulo) * dist * 0.62;

        ctx.beginPath();
        ctx.fillStyle = "rgba(" + tema.primario + "," + e.alpha + ")";
        ctx.arc(x, y, e.tamanho, 0, Math.PI * 2);
        ctx.fill();
      }

      for (let i = 0; i < 5; i++) {
        const r = raio + i * 34 + Math.sin(tempo * 0.025 + i) * 8;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.primario + "," + (0.18 - i * 0.026) + ")";
        ctx.lineWidth = 1.6;
        ctx.arc(centroX, centroY, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      for (let i = 0; i < 4; i++) {
        const rX = raio * (1.18 + i * 0.16);
        const rY = raio * (0.42 + i * 0.08);
        const rotacao = tempo * 0.005 * (i % 2 === 0 ? 1 : -1);

        ctx.save();
        ctx.translate(centroX, centroY);
        ctx.rotate(rotacao + i * 0.72);

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.secundario + "," + (0.22 - i * 0.035) + ")";
        ctx.lineWidth = 1.8;
        ctx.ellipse(0, 0, rX, rY, 0, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();
      }

      const nucleoGrad = ctx.createRadialGradient(
        centroX,
        centroY,
        0,
        centroX,
        centroY,
        raio
      );

      nucleoGrad.addColorStop(0, "rgba(255,255,255,0.96)");
      nucleoGrad.addColorStop(0.32, "rgba(" + tema.destaque + ",0.38)");
      nucleoGrad.addColorStop(0.72, "rgba(" + tema.primario + ",0.26)");
      nucleoGrad.addColorStop(1, "rgba(" + tema.primario + ",0.06)");

      ctx.beginPath();
      ctx.fillStyle = nucleoGrad;
      ctx.arc(centroX, centroY, raio, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.strokeStyle = temaAtual === "preto" || temaAtual === "neon"
        ? "rgba(255,255,255,0.34)"
        : "rgba(255,255,255,0.88)";
      ctx.lineWidth = 2;
      ctx.arc(centroX, centroY, raio * 0.98, 0, Math.PI * 2);
      ctx.stroke();

      const brilho = ctx.createRadialGradient(
        centroX - raio * 0.28,
        centroY - raio * 0.32,
        0,
        centroX - raio * 0.28,
        centroY - raio * 0.32,
        raio * 0.86
      );

      brilho.addColorStop(0, "rgba(255,255,255,0.9)");
      brilho.addColorStop(0.34, "rgba(255,255,255,0.24)");
      brilho.addColorStop(1, "rgba(255,255,255,0)");

      ctx.beginPath();
      ctx.fillStyle = brilho;
      ctx.arc(centroX, centroY, raio, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function quebrarTexto(texto, maxCaracteres) {
      const palavras = String(texto || "").split(" ");
      const linhasTexto = [];
      let atual = "";

      palavras.forEach((palavra) => {
        const tentativa = atual ? atual + " " + palavra : palavra;

        if (tentativa.length > maxCaracteres) {
          if (atual) {
            linhasTexto.push(atual);
          }

          atual = palavra;
        } else {
          atual = tentativa;
        }
      });

      if (atual) {
        linhasTexto.push(atual);
      }

      return linhasTexto;
    }

      ctx.save();
      ctx.globalAlpha = 0.96;
      arredondarRetangulo(xCaixa, yCaixa, larguraTexto, alturaCaixa, 26);

      const gradCaixa = ctx.createLinearGradient(
        xCaixa,
        yCaixa,
        xCaixa + larguraTexto,
        yCaixa + alturaCaixa
      );

      gradCaixa.addColorStop(0, tema.caixa);
      gradCaixa.addColorStop(1, tema.caixa2);

      ctx.fillStyle = gradCaixa;
      ctx.fill();

      ctx.strokeStyle = temaAtual === "preto" || temaAtual === "neon"
        ? "rgba(255,255,255,0.22)"
        : "rgba(255,255,255,0.72)";
      ctx.lineWidth = 1;
      ctx.stroke();

      ctx.font = "700 " + Math.max(13, Math.min(16, menor * 0.016)) + "px Inter, Arial";
      ctx.fillStyle = tema.corTexto;
      ctx.textBaseline = "top";

      linhasTexto.forEach((linha, index) => {
        ctx.fillText(
          linha,
          centroX,
          yCaixa + 18 + index * 24
        );
      });

      ctx.restore();
      ctx.restore();
    }

    function desenharOndas() {
      const tema = getTema();

      ctx.save();

      ondas = ondas.filter((o) => o.alpha > 0.01);

      ondas.forEach((o) => {
        o.r += o.vel;
        o.alpha *= 0.965;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(" + tema.primario + "," + o.alpha + ")";
        ctx.lineWidth = o.largura;
        ctx.arc(centroX, centroY, o.r, 0, Math.PI * 2);
        ctx.stroke();
      });

      ctx.restore();
    }

    function criarOnda(forca) {
      ondas.push({
        r: Math.max(80, Math.min(largura, altura) * 0.15),

      });
    }

function gerarNomePrintOtto() {

  const ano = agora.getFullYear();
  const mes = String(agora.getMonth() + 1).padStart(2, "0");
  const dia = String(agora.getDate()).padStart(2, "0");
  const hora = String(agora.getHours()).padStart(2, "0");
  const minuto = String(agora.getMinutes()).padStart(2, "0");

  return "OTTO_PRINT_" + ano + "-" + mes + "-" + dia + "_" + hora + "-" + minuto + "-" + segundo + ".png";
}

async function tirarPrintScreenPorVoz() {
  try {
    atualizarEstado("PRINT SCREEN", "Capturando a janela atual do OTTO");
    mostrarToast("Tirando print da janela atual...");

    if (typeof html2canvas === "undefined") {
      mostrarToast("Erro: html2canvas não carregou. Coloque o script no HEAD.");
      atualizarEstado("ERRO NO PRINT", "Biblioteca html2canvas não carregada");
      garantirMicrofoneAtivo();
      return;
    }

    const alvo = document.querySelector(".otto-shell") || document.body;

    await new Promise(function (resolve) {
      requestAnimationFrame(function () {
        setTimeout(resolve, 120);
      });
    });

    const canvasPrint = await html2canvas(alvo, {
      backgroundColor: null,
      scale: Math.min(2, window.devicePixelRatio || 1),
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: window.innerWidth,
      height: window.innerHeight,
      windowWidth: window.innerWidth,
      windowHeight: window.innerHeight,
      scrollX: 0,
      scrollY: 0,
      ignoreElements: function (elemento) {
        return elemento && elemento.id === "toastOtto";
      }
    });

    const nomeArquivo = gerarNomePrintOtto();

    canvasPrint.toBlob(async function (blob) {
      if (!blob) {
        mostrarToast("Não foi possível gerar o arquivo do print.");
        atualizarEstado("ERRO NO PRINT", "Falha ao gerar imagem");
        garantirMicrofoneAtivo();
        return;
      }

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = nomeArquivo;
      link.style.display = "none";

      document.body.appendChild(link);
      link.click();
      link.remove();

      setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 1500);

      ultimaRespostaOtto = "Print salvo: " + nomeArquivo;
      ultimaRespostaCompleta = "Print salvo: " + nomeArquivo;
      pulsoResposta = 1;

      mostrarToast("Print salvo na pasta de downloads: " + nomeArquivo);

      atualizarEstado(
        micAtivo ? "ESCUTANDO" : "PRINT SALVO",
        micAtivo ? "Print salvo. Microfone ativo continuamente" : "Print salvo com sucesso"
      );

      await falar("Print salvo.");

      garantirMicrofoneAtivo();
    }, "image/png", 1);

  } catch (erro) {
    console.error("Erro ao tirar print da janela:", erro);

    mostrarToast("Não consegui salvar o print da janela atual.");
    atualizarEstado("ERRO NO PRINT", "Falha ao capturar a janela atual");

    await falar("Não consegui salvar o print.");

    garantirMicrofoneAtivo();
  }
}

function escaparHTML(valor) {
  return String(valor ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

  function sanitizarHTML(html) {
  const template = document.createElement("template");

  template.innerHTML = String(html || "");

  template.content
    .querySelectorAll("script, iframe, object, embed, link, meta")
    .forEach((el) => {
      el.remove();
    });

  template.content
    .querySelectorAll("*")
    .forEach((el) => {
      Array.from(el.attributes).forEach((attr) => {
        const nome = attr.name.toLowerCase();
        const valor = String(attr.value || "").toLowerCase();

        if (nome.startsWith("on")) {
          el.removeAttribute(attr.name);
        }

        if (
          (nome === "href" || nome === "src") &&
          valor.startsWith("javascript:")
        ) {
          el.removeAttribute(attr.name);
        }
      });
    });

  return template.innerHTML;
}

          }).join("")}
        </div>
      `;
    }

    function classeValorTabela(valor) {
      const texto = normalizarTexto(valor);

      if (
        texto.includes("acima") ||
        texto.includes("bom") ||
        texto.includes("positivo") ||
        texto.includes("batida") ||
        texto.includes("atingida") ||
        texto.includes("ok")
      ) {
        return "positivo";
      }

      if (
        texto.includes("abaixo") ||
        texto.includes("distante") ||
        texto.includes("critico") ||
        texto.includes("crítico") ||
        texto.includes("negativo") ||
        texto.includes("atencao") ||
        texto.includes("atenção")
      ) {
        return "negativo";
      }

      if (
        texto.includes("alerta") ||
        texto.includes("parcial") ||
        texto.includes("observacao") ||
        texto.includes("observação")
      ) {
        return "alerta";
      }

      return "";
    }

    function renderizarTabela(tabela) {
      if (!tabela) return "";

      const colunas = Array.isArray(tabela.colunas) ? tabela.colunas : [];
      const linhas = Array.isArray(tabela.linhas) ? tabela.linhas : [];

      if (!colunas.length || !linhas.length) return "";

      return `
        <div class="resultado-tabela-wrap">
          <table class="resultado-tabela">
            <thead>
              <tr>
                ${colunas.map((coluna) => `<th>${escaparHTML(coluna.label || coluna.nome || coluna.key || coluna)}</th>`).join("")}
              </tr>
            </thead>

            <tbody>
              ${linhas.map((linha) => {
                return `
                  <tr>
                    ${colunas.map((coluna) => {
                      const chave = coluna.key || coluna.nome || coluna;
                      const valor = linha[chave] ?? "";
                      const classe = classeValorTabela(valor);

                      return `<td class="${classe}">${escaparHTML(valor)}</td>`;
                    }).join("")}
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderizarGraficos(graficos) {
      if (!Array.isArray(graficos) || !graficos.length) return "";

      return graficos.map((grafico, index) => {
        return `
          <div class="resultado-grafico-box">
            <div class="resultado-grafico-titulo">${escaparHTML(grafico.titulo || grafico.title || "Gráfico")}</div>
            <canvas id="resultadoGrafico${index}" class="resultado-grafico-canvas"></canvas>
          </div>
        `;
      }).join("");
    }

    function montarGraficos(graficos) {
      if (!Array.isArray(graficos) || !graficos.length) return;
      if (typeof Chart === "undefined") return;

      graficos.forEach((grafico, index) => {
        const canvasGrafico = document.getElementById("resultadoGrafico" + index);

        if (!canvasGrafico) return;

        const tipo = grafico.tipo || grafico.type || "bar";

        const labels =
          Array.isArray(grafico.labels)
            ? grafico.labels
            : Array.isArray(grafico.dados)
              ? grafico.dados.map((item) => item.label || item.nome || item.empresa || item.mes || item.data || "")
              : [];

        let datasets = [];

        if (Array.isArray(grafico.datasets)) {
          datasets = grafico.datasets.map((dataset) => {
            return {
              ...dataset,
              borderWidth: dataset.borderWidth || 2,
              tension: dataset.tension ?? 0.35
            };
          });
        } else if (Array.isArray(grafico.dados)) {
          datasets = [
            {
              label: grafico.label || grafico.titulo || "Valor",
              data: grafico.dados.map((item) => Number(item.valor || item.value || item.total || item.percentual || 0)),
              borderWidth: 2,
              tension: 0.35
            }
          ];
        } else if (Array.isArray(grafico.valores)) {
          datasets = [
            {
              label: grafico.label || grafico.titulo || "Valor",
              data: grafico.valores.map((valor) => Number(valor || 0)),
              borderWidth: 2,
              tension: 0.35
            }
          ];
        }

        const chart = new Chart(canvasGrafico, {
          type: tipo,
          data: {
            labels: labels,
            datasets: datasets
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: {
              mode: "index",
              intersect: false
            },
            plugins: {
              legend: {
                display: datasets.length > 1 || tipo === "pie" || tipo === "doughnut",
                labels: {
                  font: {
                    family: "Inter",
                    weight: "700"
                  }
                }
              },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    const valor = context.raw;

                    if (grafico.formato === "moeda") {
                      return " " + Number(valor || 0).toLocaleString("pt-BR", {
                        style: "currency",
                        currency: "BRL"
                      });
                    }

                    if (grafico.formato === "percentual") {
                      return " " + Number(valor || 0).toLocaleString("pt-BR") + "%";
                    }

                    return " " + String(valor);
                  }
                }
              }
            },
            scales: tipo === "pie" || tipo === "doughnut" || tipo === "polarArea" || tipo === "radar"
              ? {}
              : {
                  y: {
                    beginAtZero: true,
                    ticks: {
                      callback: function (valor) {
                        if (grafico.formato === "moeda") {
                          return Number(valor || 0).toLocaleString("pt-BR", {
                            style: "currency",
                            currency: "BRL",
                            maximumFractionDigits: 0
                          });
                        }

                        if (grafico.formato === "percentual") {
                          return valor + "%";
                        }

                        return valor;
                      }
                    }
                  },
                  x: {
                    ticks: {
                      font: {
                        family: "Inter",
                        weight: "700"
                      }
                    }
                  }
                }
          }
        });

        graficosResultado.push(chart);
      });
    }

 function renderizarRespostaAPI(payloadNormalizado) {

    Array.isArray(canvasApi.graficos)
      ? canvasApi.graficos
      : [];

  const graficosFinais =
    graficosCanvas.length
      ? graficosCanvas
      : graficosPayload;

  htmlFinal += renderizarGraficos(graficosFinais);

  resultadoContent.innerHTML =
    htmlFinal ||

  abrirResultado();

function detectarComandoPrint(texto) {
  const t = normalizarTexto(texto);

  return (
    t === "print screen" ||
    t === "print" ||
    t === "tirar print" ||
    t === "tira print" ||
    t === "salvar print" ||
    t === "salva print" ||
    t === "capturar tela" ||
    t === "captura de tela" ||
    t.includes("print screen") ||
    t.includes("tirar print") ||
    t.includes("tira print") ||
    t.includes("salvar print") ||
    t.includes("capturar tela") ||
    t.includes("captura de tela")
  );
}

function gerarNomePrintOtto() {
  const agora = new Date();

  const ano = agora.getFullYear();
  const mes = String(agora.getMonth() + 1).padStart(2, "0");
  const dia = String(agora.getDate()).padStart(2, "0");
  const hora = String(agora.getHours()).padStart(2, "0");
  const minuto = String(agora.getMinutes()).padStart(2, "0");
  const segundo = String(agora.getSeconds()).padStart(2, "0");

  return `OTTO_PRINT_${ano}-${mes}-${dia}_${hora}-${minuto}-${segundo}.png`;
}




function extrairMensagemErroBonita(erro) {
  const mensagemBruta =
    erro?.message ||
    erro?.erro ||
    erro?.error ||
    String(erro || "Erro desconhecido");

  let titulo = "Falha na conexão";
  let subtitulo = "Não foi possível concluir a solicitação";
  let detalhe = mensagemBruta;
  let dica = "Verifique a rota, o deploy da Vercel e a resposta da API.";

  if (
    mensagemBruta.includes("Failed to fetch") ||
    mensagemBruta.includes("NetworkError") ||
    mensagemBruta.includes("Load failed") ||
    mensagemBruta.includes("fetch")
  ) {
    titulo = "API fora do ar";
    subtitulo = "O OTTO não conseguiu acessar a central administrativa";
    detalhe = "Falha de rede ou API indisponível.";
    dica = "Verifique se a rota /api/admin-agente está funcionando e se o domínio está online.";
  }

  if (mensagemBruta.includes("Erro HTTP 404")) {
    titulo = "Rota não encontrada";
    subtitulo = "A URL chamada pelo OTTO não existe";
    detalhe = "Erro HTTP 404.";
    dica = "Confira se a rota /api/admin-agente existe no projeto e se o deploy foi feito.";
  }

  if (mensagemBruta.includes("Erro HTTP 401") || mensagemBruta.includes("Erro HTTP 403")) {
    titulo = "Acesso negado";
    subtitulo = "A API recusou a autorização enviada pelo OTTO";
    detalhe = mensagemBruta;
    dica = "Confira o Authorization/Bearer e as regras de acesso da API.";
  }

  if (mensagemBruta.includes("Erro HTTP 500")) {
    titulo = "Erro interno da API";
    subtitulo = "A central recebeu a pergunta, mas falhou ao processar";
    detalhe = "Erro HTTP 500.";
    dica = "Abra os logs da Vercel para ver o erro real da API.";
  }

  if (mensagemBruta.includes("Unexpected token") || mensagemBruta.includes("JSON")) {
    titulo = "Resposta inválida da API";
    subtitulo = "A API respondeu algo que não é JSON válido";
    detalhe = mensagemBruta;
    dica = "A rota pode estar retornando HTML, erro bruto ou texto fora do padrão JSON.";
  }

  return {
    titulo,
    subtitulo,
    detalhe,
    dica
  };
}

  const texto = String(valor || "");

    return texto;
  }

  return texto.slice(0, limite) + "\n[conteúdo cortado para evitar erro 413]";
}

      minute: "2-digit"
    }
  );
}

function nomeArquivoPDFOtto() {
  const agora = new Date();

  const data = agora.toLocaleDateString(
    "pt-BR",
    {
      timeZone: "America/Bahia",
      day: "2-digit",
      month: "2-digit",
      year: "numeric"
    }
  ).replaceAll("/", "-");

  const hora = agora.toLocaleTimeString(
    "pt-BR",
    {
      timeZone: "America/Bahia",
      hour: "2-digit",
      minute: "2-digit"
    }
  ).replaceAll(":", "-");

  return "OTTO-" + data + "-" + hora + ".pdf";
}

function mostrarLoadingPDFOtto() {
  const loading = document.getElementById("pdfOttoLoading");

  if (loading) {
    loading.classList.add("ativo");
  }
}

function esconderLoadingPDFOtto() {
  const loading = document.getElementById("pdfOttoLoading");

  if (loading) {
    loading.classList.remove("ativo");
  }
}

function mostrarToastPDFOtto(texto) {
  if (typeof mostrarToast === "function") {
    mostrarToast(texto);
    return;
  }

  const toast = document.getElementById("toastOtto");

  if (!toast) {
    alert(texto);
    return;
  }

  toast.textContent = texto;
  toast.classList.add("ativo");

  clearTimeout(window.toastTimerPDFOtto);

  window.toastTimerPDFOtto = setTimeout(function () {
    toast.classList.remove("ativo");
  }, 2600);
}

function pegarHTMLDoCanvasOuResultado() {
  const canvasLayer = document.getElementById("canvasLayer");
  const canvasFrame = document.getElementById("canvasFrame");
  const resultadoLayer = document.getElementById("resultadoLayer");
  const resultadoContent = document.getElementById("resultadoContent");
  const resultadoTitulo = document.getElementById("resultadoTitulo");

  const canvasEstaAberto =
    canvasLayer &&
    canvasLayer.classList.contains("ativo") &&
    canvasFrame;

  if (canvasEstaAberto) {
    try {
      const documentoFrame =
        canvasFrame.contentDocument ||
        canvasFrame.contentWindow.document;

      if (
        documentoFrame &&
        documentoFrame.body &&
        documentoFrame.body.innerHTML.trim()
      ) {
        const tituloFrame =
          documentoFrame.title ||
          resultadoTitulo?.textContent ||
          "Canvas OTTO";

        return {
          titulo: tituloFrame,
          origem: "CANVAS",
          html: documentoFrame.body.innerHTML
        };
      }
    } catch (erroFrame) {
      console.warn("Não foi possível ler o iframe do canvas:", erroFrame);
    }
  }

  const resultadoEstaAberto =
    resultadoLayer &&
    resultadoLayer.classList.contains("ativo") &&
    resultadoContent &&
    resultadoContent.innerHTML.trim();

  if (resultadoEstaAberto) {
    return {
      titulo: resultadoTitulo?.textContent || "Resultado OTTO",
      origem: "RESULTADO",
      html: resultadoContent.innerHTML
    };
  }

  if (resultadoContent && resultadoContent.innerHTML.trim()) {
    return {
      titulo: resultadoTitulo?.textContent || "Resultado OTTO",
      origem: "RESULTADO",
      html: resultadoContent.innerHTML
    };
  }

  return {
    titulo: "OTTO",
    origem: "TELA",
    html: "<p>Nenhum conteúdo disponível para gerar PDF.</p>"
  };
}

function criarElementoPDFOtto(dados) {
  const area = document.createElement("div");

  area.className = "pdf-otto-wrapper";

  area.innerHTML = `
    <div class="pdf-otto-topo">
      <div class="pdf-otto-marca">
        <div class="pdf-otto-logo">OTTO</div>

        <div class="pdf-otto-titulo-area">
          <div class="pdf-otto-kicker">
            ${escaparHTMLPdfOtto(dados.origem)} • RELATÓRIO INTELIGENTE
          </div>

          <div class="pdf-otto-titulo">
            ${escaparHTMLPdfOtto(dados.titulo)}
          </div>
        </div>
      </div>

      <div class="pdf-otto-data">
        Gerado em<br>
        ${escaparHTMLPdfOtto(formatarDataHoraPDFOtto())}
      </div>
    </div>

    <div class="pdf-otto-conteudo">
      ${dados.html}
    </div>

    <div class="pdf-otto-rodape">
      <div>OTTO • Central Executiva</div>
      <div>Documento gerado automaticamente</div>
    </div>
  `;

  area.style.position = "fixed";
  area.style.left = "-20000px";
  area.style.top = "0";
  area.style.zIndex = "-1";

  document.body.appendChild(area);

  return area;
}

async function converterElementoParaPDFOtto(elemento) {
  const jsPDFGlobal =
    window.jspdf &&
    window.jspdf.jsPDF;

  if (!jsPDFGlobal) {
    throw new Error("Biblioteca jsPDF não carregou.");
  }

  if (typeof html2canvas !== "function") {
    throw new Error("Biblioteca html2canvas não carregou.");
  }

  const canvasPDF = await html2canvas(
    elemento,
    {
      scale: 2,
      backgroundColor: "#ffffff",
      useCORS: true,
      allowTaint: true,
      logging: false,
      windowWidth: elemento.scrollWidth,
      windowHeight: elemento.scrollHeight
    }
  );

  const imagem = canvasPDF.toDataURL("image/jpeg", 0.96);

  const pdf = new jsPDFGlobal(
    "p",
    "mm",
    "a4"
  );

  const larguraPagina = pdf.internal.pageSize.getWidth();
  const alturaPagina = pdf.internal.pageSize.getHeight();

  const margem = 8;
  const larguraImagem = larguraPagina - margem * 2;
  const alturaImagem = canvasPDF.height * larguraImagem / canvasPDF.width;

  let alturaRestante = alturaImagem;
  let posicaoY = margem;

  pdf.addImage(
    imagem,
    "JPEG",
    margem,
    posicaoY,
    larguraImagem,
    alturaImagem
  );

  alturaRestante -= alturaPagina - margem * 2;

  while (alturaRestante > 0) {
    pdf.addPage();

    posicaoY =
      margem -
      (alturaImagem - alturaRestante);

    pdf.addImage(
      imagem,
      "JPEG",
      margem,
      posicaoY,
      larguraImagem,
      alturaImagem
    );

    alturaRestante -= alturaPagina - margem * 2;
  }

  return pdf;
}

async function baixarPDFOtto() {
  let elementoPDF = null;

  try {
    mostrarLoadingPDFOtto();

    await new Promise(function (resolve) {
      setTimeout(resolve, 180);
    });

    const dados = pegarHTMLDoCanvasOuResultado();

    elementoPDF = criarElementoPDFOtto(dados);

    await new Promise(function (resolve) {
      setTimeout(resolve, 250);
    });

    const pdf = await converterElementoParaPDFOtto(elementoPDF);

    pdf.save(nomeArquivoPDFOtto());

    mostrarToastPDFOtto("PDF do OTTO baixado com sucesso.");
  } catch (erro) {
    console.error("Erro ao gerar PDF OTTO:", erro);

    mostrarToastPDFOtto(
      "Não consegui gerar o PDF. Verifique se o conteúdo do canvas está carregado."
    );
  } finally {
    if (elementoPDF && elementoPDF.parentNode) {
      elementoPDF.parentNode.removeChild(elementoPDF);
    }

    esconderLoadingPDFOtto();
  }
}
